  backdrop-filter: blur(2px);
}
.grenier-modal {
  background: var(--gr-bg2);
  border: 1px solid var(--gr-border-bright);
  border-bottom: none;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.grenier-modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--gr-orange);
  margin-bottom: 20px;
  text-align: center;
}
.grenier-modal-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gr-orange2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.grenier-modal-input {
  width: 100%;
  background: var(--gr-surface);
  border: 1.5px solid var(--gr-border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 15px;
  color: var(--text);
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
.grenier-modal-input:focus { border-color: var(--gr-orange); }
.grenier-modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.grenier-btn-primary {
  flex: 1;
  background: var(--gr-orange);
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  font-family: var(--font-body);
}
.grenier-btn-primary:hover { background: var(--gr-orange2); }
.grenier-btn-secondary {
  flex: 1;
  background: var(--gr-surface);
  border: 1px solid var(--gr-border-bright);
  border-radius: var(--radius-sm);
  padding: 13px;
  color: var(--gr-orange2);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
}

/* colour picker row */
.grenier-color-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.grenier-color-swatch {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.grenier-color-swatch.selected { border-color: #fff; transform: scale(1.15); }

/* folder select chips */
.grenier-folder-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.grenier-folder-chip {
  background: var(--gr-surface);
  border: 1.5px solid var(--gr-border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.grenier-folder-chip.selected {
  background: var(--gr-orange-dim);
  border-color: var(--gr-orange);
  color: var(--gr-orange);
}

/* ── Card Creation Screen ────────────────────────────────────── */
.grenier-card-create-screen {
  background: var(--gr-bg);
  min-height: 100%;
  position: relative;
}
.grenier-form-section {
  padding: 0 16px 16px;
  position: relative;
  z-index: 1;
}
.grenier-form-section + .grenier-form-section {
  padding-top: 0;
}

/* ── Study Session ───────────────────────────────────────────── */
.grenier-study-screen {
  background: var(--gr-bg);
  min-height: 100%;
  display: flex;
  flex-direction: column;
}
.grenier-study-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--gr-border);
  position: relative;
  z-index: 1;
}
.grenier-study-progress {
  flex: 1;
  height: 4px;
  background: var(--gr-surface);
  border-radius: 2px;
  margin: 0 12px;
  overflow: hidden;
}
.grenier-study-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gr-orange), var(--gr-amber));
  border-radius: 2px;
  transition: width 0.4s ease;
}
.grenier-study-count {
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--gr-orange);
  white-space: nowrap;
}
.grenier-card-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 16px;
  overflow-y: auto;
  position: relative;
  z-index: 1;
}
/* The main card — mimics Mot en Focus but orange */
.grenier-card {
  width: 100%;
  max-width: 480px;
  background: var(--card-bg, var(--gr-surface));
  border: 1.5px solid var(--card-border, var(--gr-border-bright));
  border-radius: var(--radius-lg);
  padding: 24px 20px 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(255,107,26,0.1);
}
.grenier-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--card-accent, var(--gr-orange)), var(--gr-amber));
}
.grenier-card-word {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  text-align: center;
  color: var(--card-accent, var(--gr-orange));
  text-shadow: 0 0 30px var(--gr-orange-glow);
  margin-bottom: 4px;
}
.grenier-card-ipa {
  text-align: center;
  font-size: 18px;
  color: var(--gr-amber);
  opacity: 0.85;
  margin-bottom: 16px;
  letter-spacing: 0.03em;
}
.grenier-card-listen-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.grenier-card-btn {
  flex: 1;
  background: var(--gr-surface2);
  border: 1px solid var(--gr-border-bright);
  border-radius: var(--radius-sm);
  padding: 10px;
  color: var(--gr-orange2);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: background 0.15s;
}
.grenier-card-btn:hover { background: var(--gr-orange-dim); }
.grenier-card-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.grenier-record-btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 8px 0;
}
.grenier-record-btn {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gr-orange), var(--gr-amber));
  border: none;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px var(--gr-orange-glow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.grenier-record-btn:hover { transform: scale(1.05); }
.grenier-record-btn.recording {
  animation: grPulse 1.2s ease-in-out infinite;
  box-shadow: 0 0 0 0 var(--gr-orange-glow);
}

  0%,100% { box-shadow: 0 4px 20px var(--gr-orange-glow), 0 0 0 0 rgba(255,107,26,0.4); }

}
.grenier-record-btn svg { width: 28px; height: 28px; }
.grenier-record-label { font-size: 12px; color: var(--gr-orange2); margin-top: 6px; opacity: 0.8; }

.grenier-rating-area {
  width: 100%;
  max-width: 480px;
  margin-top: 14px;
}
.grenier-rating-label {
  text-align: center;
  font-size: 11px;

  margin-bottom: 10px;
}
.grenier-rating-btns {
  display: flex;
  gap: 8px;
}
.grenier-rate-btn {
  flex: 1;
  border: none;
  border-radius: var(--radius-sm);
  padding: 13px 6px;

  font-weight: 700;
  cursor: pointer;

  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.grenier-rate-btn span { font-size: 10px; font-weight: 400; opacity: 0.8; }
.gr-rate-again { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.4); color: #F87171; }
.gr-rate-hard  { background: rgba(251,191,36,0.15);  border: 1px solid rgba(251,191,36,0.4);  color: #FBBF24; }
.gr-rate-good  { background: rgba(52,211,153,0.15);  border: 1px solid rgba(52,211,153,0.4);  color: #34D399; }
.gr-rate-easy  { background: rgba(99,102,241,0.15);  border: 1px solid rgba(99,102,241,0.4);  color: #818CF8; }

.grenier-rhymes-btn {
  background: none;
  border: 1.5px solid var(--gr-border-bright);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--gr-amber);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  margin: 8px auto 0;
  font-family: var(--font-body);
  transition: background 0.15s;
}
.grenier-rhymes-btn:hover { background: var(--gr-orange-dim); }

.grenier-card-settings-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: var(--gr-bg2);
  border: 1px solid var(--gr-border-bright);
  border-bottom: none;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 20px 20px 40px;
  z-index: 200;
  animation: slideUp 0.25s ease;
}
.grenier-card-settings-title {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--gr-orange);
  margin-bottom: 16px;
  text-align: center;
}
.grenier-settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--gr-border);
  font-size: 14px;
  color: var(--text);
}
.grenier-settings-row:last-child { border-bottom: none; }
.grenier-toggle {
  width: 40px; height: 22px;
  background: var(--gr-surface2);
  border-radius: 100px;
  position: relative;
  cursor: pointer;
  border: 1px solid var(--gr-border);
  transition: background 0.2s;
  flex-shrink: 0;
}
.grenier-toggle.on { background: var(--gr-orange); border-color: var(--gr-orange); }
.grenier-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: left 0.2s;
}
.grenier-toggle.on::after { left: 20px; }

.grenier-done-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  flex: 1;

.grenier-done-icon { font-size: 64px; margin-bottom: 16px; }
.grenier-done-title {
  font-family: var(--font-display);
  font-size: 26px;
  color: var(--gr-orange);
  text-shadow: 0 0 30px var(--gr-orange-glow);
  margin-bottom: 8px;

.grenier-done-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.5; }
.grenier-done-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 360px;
  margin-bottom: 28px;
}
.grenier-done-stat {
  background: var(--gr-surface);
  border: 1px solid var(--gr-border);
  border-radius: var(--radius-sm);
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;

.grenier-done-stat-val { font-family: var(--font-display); font-size: 20px; font-weight: 700; }

/* ── Labo tile orange override ──────────────────────────────── */
.labo-tile-grenier {
  --cat-color: #2A0E00;
  --cat-accent: #FF6B1A;
}

  _setupLongPress() {
    let lpTimer = null;
    let lpTarget = null;
    const DURATION = 500;

    const cancel = () => {
      clearTimeout(lpTimer);
      lpTimer = null;
      if (lpTarget) {
        lpTarget.classList.remove('lp-active');
        lpTarget.classList.remove('lp-active-row');
        lpTarget.classList.remove('lp-active-recent');
        lpTarget = null;
      }
    };

    const main = document.getElementById('main');

    // ── contextmenu fires on Android long-press (and desktop right-click) ──
    // Use it as the primary long-press trigger for word rows
    main.addEventListener('contextmenu', e => {
      const row = e.target.closest('.rep-word-row');
      if (row) {
        e.preventDefault();
        cancel();
        if (App._repSelectedIds.length >= 1 && !row.classList.contains('rep-selected')) {
          App._repToggleSelect(row);
          return;
        }
        App._repToggleSelect(row);
        return;
      }
      const rcard = e.target.closest('.rep-recent-card');
      if (rcard) {
        e.preventDefault();
        cancel();
        const word = rcard.dataset.recentWord;
        App._recentToggleSelect(rcard, word);
        return;
      }
    });

    // ── pointerdown: handles bilan word-focus long-press + desktop/Chromebook rep rows ──
    main.addEventListener('pointerdown', e => {
      // Bilan annotation word (data-wf)
      const wfEl = e.target.closest('[data-wf]');
      if (wfEl) {
        lpTarget = wfEl;
        wfEl.classList.add('lp-active');
        lpTimer = setTimeout(() => {
          wfEl.classList.remove('lp-active');
          const word = wfEl.dataset.wf;
          if (word) {
            wfEl.addEventListener('click', ev => ev.stopImmediatePropagation(), { once: true, capture: true });
            App._wfFromBilan = App.currentScreen === 'bilan';
            App.navigate('word-focus', { word });
          }
          lpTimer = null; lpTarget = null;
        }, DURATION);
        return;
      }

      // Répertoire word row — pointer timer (Chromebook / desktop)
      const row = e.target.closest('.rep-word-row');
      if (row) {
        // In pick mode (≥1 selected): single tap selects immediately, no timer needed
        if (App._repSelectedIds.length >= 1) {
          if (!row.classList.contains('rep-selected')) {
            App._repToggleSelect(row);
          } else {
            App._repToggleSelect(row); // deselect
          }
          return;
        }
        // Normal mode: ignore play btn and word text (those are single-tap)
        if (e.target.closest('.rep-play-btn') || e.target.closest('.rep-word-text')) return;
        lpTarget = row;
        row.classList.add('lp-active-row');
        lpTimer = setTimeout(() => {
          row.classList.remove('lp-active-row');
          lpTimer = null; lpTarget = null;
          App._repToggleSelect(row);
        }, DURATION);
        return;
      }

      // Recent card — pointer timer for long-press select (Chromebook / desktop)
      const rcard = e.target.closest('.rep-recent-card');
      if (rcard) {
        // If already in recent-select mode, single tap selects
        if (App._recentSelectedWords && App._recentSelectedWords.length > 0) {
          const word = rcard.dataset.recentWord;
          App._recentToggleSelect(rcard, word);
          return;
        }
        lpTarget = rcard;
        rcard.classList.add('lp-active-recent');
        lpTimer = setTimeout(() => {
          rcard.classList.remove('lp-active-recent');
          lpTimer = null; lpTarget = null;
          const word = rcard.dataset.recentWord;
          App._recentToggleSelect(rcard, word);
        }, DURATION);
        return;
      }
    }, { passive: true });

    main.addEventListener('pointerup', cancel);
    main.addEventListener('pointermove', e => {
      // Only cancel if moved more than a few px (avoids cancelling on tiny finger wobble)
      if (lpTarget && e.movementX !== undefined && (Math.abs(e.movementX) > 6 || Math.abs(e.movementY) > 6)) cancel();
      else if (lpTarget && e.movementX === undefined) cancel();
    });
    main.addEventListener('pointercancel', cancel);
  },

  async wfLoadWord() {
    const input = document.getElementById('wfInput');
    const word = (input?.value || '').trim().replace(/\s+/g, ' ').toLowerCase();
    if (!word) return;
    // Reflect normalised value back into the input
    if (input) input.value = word;
    this._wfCurrentWord = word;
    this._wfCurrentIpa = '';
    // Reset UI
    const card = document.getElementById('wfWordCard');
    const wordDisplay = document.getElementById('wfWordDisplay');
    const ipaEl = document.getElementById('wfIpa');
    const listenBtn = document.getElementById('wfListenBtn');
    const recordBtn = document.getElementById('wfRecordBtn');
    if (card) card.style.display = '';
    if (wordDisplay) wordDisplay.textContent = word;
    if (ipaEl) { ipaEl.textContent = 'Chargement IPA…'; ipaEl.className = 'wf-ipa wf-ipa-loading'; }
    if (listenBtn) listenBtn.disabled = false;
    if (recordBtn) recordBtn.disabled = false;
    // Show save button and update its state
    const saveBtn = document.getElementById('wfSaveBtn');
    if (saveBtn) { saveBtn.style.display = ''; App._wfUpdateSaveBtn(); }
    // Show compare button
    const cmpBtn = document.getElementById('wfCompareBtn');
    if (cmpBtn) cmpBtn.style.display = '';
    // Show rhymes button and clear previous rhymes
    const rhymesBtn = document.getElementById('wfRhymesBtn');
    if (rhymesBtn) { rhymesBtn.style.display = ''; rhymesBtn.classList.remove('loading'); }
    const rhymesSlot = document.getElementById('wfRhymesSlot');
    if (rhymesSlot) rhymesSlot.innerHTML = '';
    // Show/update rep nav button — always visible when a word is loaded
    const repNavBtn = document.getElementById('wfRepNavBtn');
    if (repNavBtn) repNavBtn.style.display = '';
    App._wfUpdateRepBtn();
    // Record this word in lookup history (IPA added after fetch)
    this._wfRecordLookup(word, '');
    // Reset score/playback
    this.retryRecording();
    const relistenBtn = document.getElementById('wfRelistenBtn');
    if (relistenBtn) { relistenBtn.disabled = true; relistenBtn.style.color = ''; relistenBtn.style.borderColor = ''; }
    // Fetch IPA
    await this._wfFetchIpa(word);
  },

  async _wfFetchIpa(word) {
    const ipaEl = document.getElementById('wfIpa');
    try {
      // Try Wiktionary REST API (French section)
      const lang = this.settings.frVariant === 'fr-CA' ? 'fr' : 'fr';
      const url = `https://en.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(word.toLowerCase())}`;
      const resp = await fetch(url);
      if (resp.ok) {
        const data = await resp.json();
        const frSection = data?.fr;
        if (frSection) {
          // Look for IPA in pronunciations
          for (const entry of frSection) {
            if (entry.pronunciations) {
              for (const p of entry.pronunciations) {
                const match = p.match(/\/([^/]+)\//);
                if (match) {
                  this._wfCurrentIpa = `/${match[1]}/`;
                  if (ipaEl) { ipaEl.textContent = this._wfCurrentIpa; ipaEl.className = 'wf-ipa'; }
                  // Backfill IPA into lookup history
                  const lh = this._lookupHistory.find(h => h.word === word);
                  if (lh) { lh.ipa = this._wfCurrentIpa; this.saveLookupHistory(); }
                  return;
                }
              }
            }
          }
        }
      }
      // Fallback: try French Wiktionary
      const url2 = `https://fr.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word)}&prop=revisions&rvprop=content&format=json&origin=*`;
      const resp2 = await fetch(url2);
      if (resp2.ok) {
        const data2 = await resp2.json();
        const pages = data2?.query?.pages;
        if (pages) {
          const content = Object.values(pages)[0]?.revisions?.[0]?.['*'] || '';
          const ipaMatch = content.match(/\{\{pron\|([^|}\]]+)/i) || content.match(/IPA[^\n]*\/([^/\n]+)\//i);
          if (ipaMatch) {
            this._wfCurrentIpa = `/${ipaMatch[1]}/`;
            if (ipaEl) { ipaEl.textContent = this._wfCurrentIpa; ipaEl.className = 'wf-ipa'; }
            // Backfill IPA into lookup history
            const lh2 = this._lookupHistory.find(h => h.word === word);
            if (lh2) { lh2.ipa = this._wfCurrentIpa; this.saveLookupHistory(); }
            return;
          }
        }
      }
    } catch(e) { /* silent */ }
    // If nothing found
    if (ipaEl) { ipaEl.textContent = 'IPA non disponible'; ipaEl.className = 'wf-ipa wf-ipa-loading'; }
  },

  wfSpeak() {
    if (!this._wfCurrentWord) return;
    this.speakText(this._wfCurrentWord, true);
  },

  wfToggleRecording() {
    if (this.recording) {
      this.stopRecording('__wf__', 'word-focus');
    } else {
      this._wfStartRecording();
    }
  },

  async _wfStartRecording() {
    const btn = document.getElementById('wfRecordBtn');
    const label = document.getElementById('wfRecordLabel');
    if (btn) btn.classList.add('recording');
    if (label) label.textContent = 'Enregistrement…';
    this.retryRecording();
    await this.startRecording('__wf__', 'word-focus');
  },

  _wfRenderHistoryChips() {
    if (!this._wfHistory.length) return '';
    return this._wfHistory.map((h, i) =>
      `<div class="wf-history-chip" onclick="App.wfLoadFromHistory(${i})">
        ${h.word}
        ${h.score != null ? `<span class="wf-chip-score" style="color:${h.color}">${h.score}%</span>` : ''}
      </div>`
    ).join('');
  },

  wfLoadFromHistory(idx) {
    const h = this._wfHistory[idx];
    if (!h) return;
    const input = document.getElementById('wfInput');
    if (input) input.value = h.word;
    this._wfCurrentWord = h.word;
    this._wfCurrentIpa = h.ipa || '';
    const card = document.getElementById('wfWordCard');
    const wordDisplay = document.getElementById('wfWordDisplay');
    const ipaEl = document.getElementById('wfIpa');
    const listenBtn = document.getElementById('wfListenBtn');
    const recordBtn = document.getElementById('wfRecordBtn');
    if (card) card.style.display = '';
    if (wordDisplay) wordDisplay.textContent = h.word;
    if (ipaEl) { ipaEl.textContent = h.ipa || 'IPA non disponible'; ipaEl.className = h.ipa ? 'wf-ipa' : 'wf-ipa wf-ipa-loading'; }
    if (listenBtn) listenBtn.disabled = false;
    if (recordBtn) recordBtn.disabled = false;
    this.retryRecording();
    const relistenBtn = document.getElementById('wfRelistenBtn');
    if (relistenBtn) { relistenBtn.disabled = true; }
    // Update save button state
    const saveBtn2 = document.getElementById('wfSaveBtn');
    if (saveBtn2) { saveBtn2.style.display = ''; App._wfUpdateSaveBtn(); }
  },

  wfRecordComplete(score, color) {
    // Save to history (update if word exists, else prepend)
    const existing = this._wfHistory.findIndex(h => h.word.toLowerCase() === this._wfCurrentWord.toLowerCase());
    const entry = { word: this._wfCurrentWord, ipa: this._wfCurrentIpa, score, color };
    if (existing >= 0) this._wfHistory[existing] = entry;
    else this._wfHistory.unshift(entry);
    // Keep only last 20
    if (this._wfHistory.length > 20) this._wfHistory = this._wfHistory.slice(0, 20);
    // Enable réécouter
    const relistenBtn = document.getElementById('wfRelistenBtn');
    if (relistenBtn) { relistenBtn.disabled = false; relistenBtn.style.color = '#14B8A6'; relistenBtn.style.borderColor = 'rgba(20,184,166,0.4)'; }
    // Update record btn
    const btn = document.getElementById('wfRecordBtn');
    const label = document.getElementById('wfRecordLabel');
    if (btn) btn.classList.remove('recording');
    if (label) label.textContent = 'Enregistrer à nouveau';
    // Refresh history panel
    const hist = document.getElementById('wfHistory');
    const histList = document.getElementById('wfHistoryList');
    if (hist) hist.style.display = '';
    if (histList) histList.innerHTML = this._wfRenderHistoryChips();
    // Show "add compare" button now we have a loaded word
    this._wfMaybeShowCompareBtn();
  },

  _wfToggleCompare() {
    const slot = document.getElementById('wfCompareSlot');
    const btn = document.getElementById('wfCompareBtn');
    if (!slot) return;
    if (slot.children.length > 0) {
      // Close it
      slot.innerHTML = '';
      if (btn) { btn.classList.remove('active'); btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Comparer`; }
    } else {
      // Open input
      if (btn) btn.classList.add('active');
      this._wfOpenCompareInput();
    }
  },

  _wfMaybeShowCompareBtn() {
    // No-op — button is always in the card, just shown/hidden via display
  },

  _wfOpenCompareInput() {
    const slot = document.getElementById('wfCompareSlot');
    if (!slot) return;
    slot.innerHTML = `
      <div class="wf-compare-card">
        <button class="wf-compare-dismiss" onclick="App._wfDismissCompare()" title="Fermer">✕</button>
        <div class="wf-compare-label">Comparer avec…</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input class="wf-input" id="wfCompareInput" type="text" placeholder="Entrez un mot…" autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')App._wfLoadCompareWord()" style="flex:1;padding:10px 14px;font-size:15px">
          <button class="wf-go-btn" onclick="App._wfLoadCompareWord()" style="padding:10px 16px">OK</button>
        </div>
        <div id="wfCompareResult"></div>
      </div>`;
    setTimeout(() => document.getElementById('wfCompareInput')?.focus(), 100);
  },

  async _wfLoadCompareWord() {
    const input = document.getElementById('wfCompareInput');
    const word = (input?.value || '').trim().toLowerCase();
    if (!word) return;
    if (input) input.value = word;
    const result = document.getElementById('wfCompareResult');
    if (result) result.innerHTML = `<div style="color:var(--text3);font-size:12px;padding:8px 0">Chargement IPA…</div>`;
    // Fetch IPA for compare word using same Wiktionary approach
    let ipa = '';
    try {
      const url = `https://en.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(word)}`;
      const resp = await fetch(url);
      if (resp.ok) {
        const data = await resp.json();
        const fr = data.fr || [];
        for (const entry of fr) {
          if (entry.pronunciations) {
            for (const p of entry.pronunciations) {
              const m = p.match(/\/([^/]+)\//);
              if (m) { ipa = `/${m[1]}/`; break; }
            }
            if (ipa) break;
          }
        }
      }
    } catch(e) {}
    if (!ipa) {
      try {
        const url2 = `https://fr.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word)}&prop=revisions&rvprop=content&format=json&origin=*`;
        const resp2 = await fetch(url2);
        if (resp2.ok) {
          const data2 = await resp2.json();
          const pages = data2?.query?.pages;
          if (pages) {
            const content = Object.values(pages)[0]?.revisions?.[0]?.['*'] || '';
            const m = content.match(/\{\{pron\|([^|}\]]+)/i) || content.match(/IPA[^\n]*\/([^/\n]+)\//i);
            if (m) ipa = `/${m[1]}/`;
          }
        }
      } catch(e) {}
    }
    this._wfRenderCompareSlot(word, ipa);
  },

  _wfRenderCompareSlot(word, ipa = '') {
    const slot = document.getElementById('wfCompareSlot');
    if (!slot) return;
    slot.innerHTML = `
      <div class="wf-compare-card">
        <button class="wf-compare-dismiss" onclick="App._wfDismissCompare()" title="Fermer">✕</button>
        <div class="wf-compare-label">Comparaison</div>
        <div class="wf-word-display" style="font-size:26px;margin-bottom:4px">${word}</div>
        ${ipa ? `<div class="wf-ipa" style="margin-bottom:12px">${ipa}</div>` : '<div style="height:12px"></div>'}
        <div class="wf-listen-row">
          <button class="wf-listen-btn" onclick="App.speakText('${word.replace(/'/g,"\\'")}', false)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            Écouter
          </button>
          <button class="wf-listen-btn" onclick="App.speakText('${word.replace(/'/g,"\\'")}', true)" style="color:var(--text2);border-color:var(--border)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
            Lent
          </button>
        </div>
        <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px">Enregistrez le mot principal pour comparer</div>
      </div>`;
  },

  _wfDismissCompare() {
    const slot = document.getElementById('wfCompareSlot');
    if (slot) slot.innerHTML = '';
    const btn = document.getElementById('wfCompareBtn');
    if (btn) { btn.classList.remove('active'); btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Comparer`; }
  },

  _wfGoBackToBilan() {
    // Ensure the annotation overlay will be re-opened on return
    this._lastBilanAnnotationOpen = true;
    this.goBackToBilanResults();
  },

  // ── RÉPERTOIRE — DATA ────────────────────────────────────────
  // Schema: { folders: [{id, name, emoji, createdAt}], words: [{id, word, ipa, folderId, addedAt, source}] }
  _repertoire: { folders: [], words: [] },

  loadRepertoire() {
    try {
      const r = localStorage.getItem('phonetique_repertoire');
      if (r) this._repertoire = JSON.parse(r);
    } catch(e) {}
    // Ensure default folder exists
    if (!this._repertoire.folders) this._repertoire.folders = [];
    if (!this._repertoire.words) this._repertoire.words = [];
    if (!this._repertoire.folders.find(f => f.id === 'default')) {
      this._repertoire.folders.unshift({ id: 'default', name: 'Mes mots', emoji: '📚', createdAt: Date.now() });
    }
  },

  saveRepertoire() {
    localStorage.setItem('phonetique_repertoire', JSON.stringify(this._repertoire));
  },

  // ── LOOKUP HISTORY (persisted "Récents") ─────────────────────
  // Each entry: { word, ipa, lookedUpAt }  — capped at 30
  _lookupHistory: [],

  loadLookupHistory() {
    try {
      const s = localStorage.getItem('phonetique_lookup_history');
      if (s) this._lookupHistory = JSON.parse(s);
    } catch(e) { this._lookupHistory = []; }
  },

  saveLookupHistory() {
    localStorage.setItem('phonetique_lookup_history', JSON.stringify(this._lookupHistory));
  },

  _wfRecordLookup(word, ipa) {
    // Remove existing entry for this word then prepend fresh
    this._lookupHistory = this._lookupHistory.filter(h => h.word.toLowerCase() !== word.toLowerCase());
    this._lookupHistory.unshift({ word, ipa: ipa || '', lookedUpAt: Date.now() });
    if (this._lookupHistory.length > 30) this._lookupHistory = this._lookupHistory.slice(0, 30);
    this.saveLookupHistory();
  },

  _lookupRemove(word) {
    this._lookupHistory = this._lookupHistory.filter(h => h.word.toLowerCase() !== word.toLowerCase());
    this.saveLookupHistory();
    this.renderRepertoire();
  },

  // ── RECENT CARD INTERACTIONS ─────────────────────────────────
  _recentSelectedWords: [],

  _recentTap(card) {
    const word = card.dataset.recentWord;
    if (!word) return;
    // If in selection mode, toggle selection
    if (this._recentSelectedWords.length > 0) {
      this._recentToggleSelect(card, word);
      return;
    }
    // Otherwise navigate to Mot en Focus
    this._wfFromBilan = false;
    this.navigate('word-focus', { word });
  },

  _recentToggleSelect(card, word) {
    const idx = this._recentSelectedWords.indexOf(word);
    if (idx >= 0) {
      this._recentSelectedWords.splice(idx, 1);
      card.classList.remove('rep-recent-selected');
    } else {
      this._recentSelectedWords.push(word);
      card.classList.add('rep-recent-selected');
    }
    this._recentUpdateBar();
  },

  _recentUpdateBar() {
    const bar = document.getElementById('recentActionBar');
    const label = document.getElementById('recentActionLabel');
    const saveBtn = document.getElementById('recentSaveBtn');
    const n = this._recentSelectedWords.length;
    if (!bar) return;
    if (n === 0) {
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';
      if (label) label.textContent = n === 1 ? `"${this._recentSelectedWords[0]}"` : `${n} mots sélectionnés`;
      // Grey out save btn if all already in repertoire
      if (saveBtn) {
        const allSaved = this._recentSelectedWords.every(w => this.repIsWordSaved(w));
        saveBtn.style.opacity = allSaved ? '0.4' : '';
        saveBtn.disabled = allSaved;
      }
    }
  },

  _recentClearSelection() {
    this._recentSelectedWords = [];
    document.querySelectorAll('.rep-recent-card.rep-recent-selected').forEach(c => c.classList.remove('rep-recent-selected'));
    this._recentUpdateBar();
  },

  _recentSaveSelected() {
    const toSave = this._recentSelectedWords.filter(w => !this.repIsWordSaved(w));
    if (!toSave.length) return;
    // If multiple words, show folder picker for batch-add
    const entries = toSave.map(w => {
      const h = this._lookupHistory.find(h => h.word === w);
      return { word: w, ipa: h?.ipa || '' };
    });
    this._recentShowBatchSaveOverlay(entries);
  },

  _recentShowBatchSaveOverlay(entries) {
    const folders = this._repertoire.folders;
    const label = entries.length === 1 ? `"${entries[0].word}"` : `${entries.length} mots`;
    const overlay = document.createElement('div');
    overlay.className = 'rep-overlay';
    overlay.id = 'repOverlay';
    overlay.innerHTML = `
      <div class="rep-overlay-panel">
        <div class="rep-overlay-title">Ajouter au Répertoire</div>
        <div class="rep-overlay-subtitle" style="margin-bottom:8px">Ajouter ${label} dans :</div>
        ${folders.map(f => `
          <button class="rep-overlay-folder-btn" onclick="App._recentBatchSave(${JSON.stringify(entries).replace(/"/g,'&quot;')},'${f.id}')">
            <span>${f.emoji}</span> ${f.name}
          </button>`).join('')}
        <button class="rep-overlay-cancel" onclick="App._repCloseOverlay()">Annuler</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) App._repCloseOverlay(); });
  },

  _recentBatchSave(entries, folderId) {
    entries.forEach(e => { if (!this.repIsWordSaved(e.word)) this.repAddWord(e.word, e.ipa, folderId); });
    this._repCloseOverlay();
    this._recentClearSelection();
    const folderName = this._repertoire.folders.find(f => f.id === folderId)?.name || '';
    this.showToast(`${entries.length} mot(s) ajouté(s)${folderName ? ' dans ' + folderName : ''} ✓`);
    this.renderRepertoire();
  },

  _recentRemoveSelected() {
    this._recentSelectedWords.forEach(w => {
      this._lookupHistory = this._lookupHistory.filter(h => h.word.toLowerCase() !== w.toLowerCase());
    });
    this.saveLookupHistory();
    this._recentSelectedWords = [];
    this.renderRepertoire();
  },

  repIsWordSaved(word) {
    return this._repertoire.words.some(w => w.word.toLowerCase() === word.toLowerCase());
  },

  repAddWord(word, ipa, folderId = 'default') {
    // Remove existing entry if present (re-add fresh)
    this._repertoire.words = this._repertoire.words.filter(w => w.word.toLowerCase() !== word.toLowerCase());
    this._repertoire.words.unshift({
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      word, ipa: ipa || '',
      folderId,
      addedAt: Date.now(),
      source: 'mot-en-focus'
    });
    this.saveRepertoire();
  },

  repRemoveWord(wordId, skipNavigate = false) {
    this._repertoire.words = this._repertoire.words.filter(w => w.id !== wordId);
    this.saveRepertoire();
    if (!skipNavigate) this.renderRepertoire();
  },

  _repDeleteSelected() {
    const n = this._repSelectedIds.length;
    if (!n) return;
    const msg = n === 1
      ? `Supprimer ce mot du Répertoire ?`
      : `Supprimer ces ${n} mots du Répertoire ?`;
    if (!confirm(msg)) return;
    this._repSelectedIds.forEach(id => {
      this._repertoire.words = this._repertoire.words.filter(w => w.id !== id);
    });
    this._repSelectedIds = [];
    this.saveRepertoire();
    this.renderRepertoire();
  },

  repMoveWord(wordId, newFolderId) {
    const w = this._repertoire.words.find(w => w.id === wordId);
    if (w) { w.folderId = newFolderId; this.saveRepertoire(); }
    this.renderRepertoire();
  },

  repCreateFolder(name, emoji) {
    const id = 'folder_' + Date.now();
    this._repertoire.folders.push({ id, name, emoji: emoji || '📁', createdAt: Date.now() });
    this.saveRepertoire();
    return id;
  },

  repDeleteFolder(folderId) {
    // Move words to default
    this._repertoire.words.forEach(w => { if (w.folderId === folderId) w.folderId = 'default'; });
    this._repertoire.folders = this._repertoire.folders.filter(f => f.id !== folderId);
    this.saveRepertoire();
    this.renderRepertoire();
  },

  repExport() {
    const data = JSON.stringify(this._repertoire, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'repertoire_phonetique_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    this.showToast('Répertoire exporté ✓');
  },

  repImport() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.folders && data.words) {
            // Merge: keep existing words not in import, add new ones
            const existingIds = new Set(this._repertoire.words.map(w => w.word.toLowerCase()));
            const newWords = data.words.filter(w => !existingIds.has(w.word.toLowerCase()));
            // Merge folders
            const existingFolderIds = new Set(this._repertoire.folders.map(f => f.id));
            const newFolders = data.folders.filter(f => !existingFolderIds.has(f.id) && f.id !== 'default');
            this._repertoire.folders.push(...newFolders);
            this._repertoire.words.unshift(...newWords);
            this.saveRepertoire();
            this.renderRepertoire();
            this.showToast(`${newWords.length} mot(s) importé(s) ✓`);
          } else {
            this.showToast('Format de fichier invalide.');
          }
        } catch(e) { this.showToast('Erreur lors de l\'importation.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  // ── RÉPERTOIRE — UI ──────────────────────────────────────────
  _repOpenFolders: new Set(['default']),

  renderRepertoire() {
    // Ensure 'repertoire' is in navHistory so goBack() works from word-focus
    if (this.navHistory.length === 0 || this.navHistory[this.navHistory.length - 1].screen !== 'repertoire') {
      this.navHistory.push({ screen: 'repertoire', params: {} });
    }
    // Always reset selection when arriving at this screen
    this._repSelectedIds = [];
    this._recentSelectedWords = [];
    const words = this._repertoire.words;
    const folders = this._repertoire.folders;
    const totalWords = words.length;

    // ── Récents: from lookup history (words visited in Mot en Focus) ──
    const recents = this._lookupHistory.slice(0, 12);
    const recentHtml = recents.length
      ? recents.map(h => {
          const inRep = this.repIsWordSaved(h.word);
          return `
          <div class="rep-recent-card" data-recent-word="${h.word.replace(/"/g,'&quot;')}" data-recent-ipa="${(h.ipa||'').replace(/"/g,'&quot;')}"
               onclick="App._recentTap(this)">
            <div class="rep-recent-word">${h.word}</div>
            ${h.ipa ? `<div class="rep-recent-ipa">${h.ipa}</div>` : ''}
            <div class="rep-recent-date" style="display:flex;align-items:center;justify-content:center;gap:4px;margin-top:4px">
              ${inRep ? `<svg viewBox="0 0 24 24" fill="#14B8A6" stroke="#14B8A6" stroke-width="2" style="width:10px;height:10px"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>` : ''}
              <span style="font-size:10px;color:var(--text3)">${this._repFormatDate(h.lookedUpAt)}</span>
            </div>
          </div>`;
        }).join('')
      : `<div class="rep-empty-recent">Les mots consultés dans Mot en Focus apparaîtront ici.</div>`;

    // Recent selection state
    this._recentSelectedWords = this._recentSelectedWords || [];

    // Folder sections
    const foldersHtml = folders.map(folder => {
      const folderWords = words.filter(w => w.folderId === folder.id);
      const isOpen = this._repOpenFolders.has(folder.id);
      const isDefault = folder.id === 'default';
      return `
        <div class="rep-folder" id="repFolder_${folder.id}">
          <div class="rep-folder-header" onclick="App._repToggleFolder('${folder.id}')">
            <span class="rep-folder-icon">${folder.emoji}</span>
            <span class="rep-folder-name">${folder.name}</span>
            <span class="rep-folder-count">${folderWords.length}</span>
            ${!isDefault ? `<button onclick="event.stopPropagation();App._repDeleteFolderConfirm('${folder.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;" title="Supprimer le dossier">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>` : ''}
            <svg class="rep-folder-chev ${isOpen ? 'open' : ''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="rep-folder-body ${isOpen ? 'open' : ''}">
            <div class="rep-word-list">
              ${folderWords.length ? folderWords.map(w => `
                <div class="rep-word-row" data-word-id="${w.id}" data-word="${w.word.replace(/"/g,'&quot;')}" data-ipa="${(w.ipa||'').replace(/"/g,'&quot;')}">
                  <span class="rep-word-text" onclick="App._wfFromBilan=false;App.navigate('word-focus',{word:'${w.word.replace(/'/g,"\\'")}'})">${w.word}</span>
                  <span style="flex:1"></span>
                  <span class="rep-word-ipa">${w.ipa || ''}</span>
                  <div class="rep-word-quick-btns">
                    <button class="rep-play-btn" onclick="event.stopPropagation();App.speakText('${w.word.replace(/'/g,"\\'")}',false)" title="Écouter">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    </button>
                  </div>
                  <div class="rep-word-ctx">
                    <button class="rep-move-btn" onclick="event.stopPropagation();App._repShowMoveOverlay('${w.id}')" title="Déplacer">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <button class="rep-word-delete" onclick="event.stopPropagation();App.repRemoveWord('${w.id}')" title="Supprimer">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
                    </button>
                  </div>
                </div>`).join('')
              : `<div class="rep-folder-empty">Ce dossier est vide.</div>`}
            </div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('main').innerHTML = `
      <div class="screen-header">
        <button class="home-btn" onclick="App.navigate('labo')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;color:#14B8A6">
            <path d="M9 3h6v10l3.5 6a1 1 0 0 1-.9 1.5H6.4a1 1 0 0 1-.9-1.5L9 13V3z"/>
            <line x1="9" y1="3" x2="15" y2="3"/>
          </svg>
        </button>
        <button class="back-btn" onclick="App.goBack()" title="Retour">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="lang-flags">${this.flagsHTML()}</div>
        <div style="flex:1;display:flex;align-items:center;justify-content:flex-end;gap:8px">
          <span style="font-size:11px;color:var(--text3)">${totalWords} mot${totalWords !== 1 ? 's' : ''}</span>
        </div>
        <div class="screen-title" style="color:#14B8A6;flex:0">Le Répertoire</div>
      </div>
      <div class="repertoire-container">

        <div>
          <div class="rep-section-title">Récents — Mot en Focus</div>
          <div id="recentActionBar" class="rep-recent-action-bar" style="display:none">
            <span id="recentActionLabel" style="flex:1;font-size:12px;color:#14B8A6;font-weight:600"></span>
            <button class="rep-compare-go" id="recentSaveBtn" onclick="App._recentSaveSelected()" style="font-size:11px;padding:5px 10px">+ Répertoire</button>
            <button class="rep-delete-sel" id="recentRemoveBtn" onclick="App._recentRemoveSelected()" style="font-size:11px;padding:5px 10px">Retirer</button>
            <button class="rep-compare-cancel" onclick="App._recentClearSelection()">✕</button>
          </div>
          <div class="rep-recent-strip" id="recentStrip">${recentHtml}</div>
        </div>

        <div>
          <div class="rep-section-title">Dossiers</div>
          <div id="repCompareBar" class="rep-compare-bar">
            <span class="rep-compare-bar-label" id="repCompareLabel"></span>
            <button class="rep-compare-go" id="repCompareBtn" onclick="App._repLaunchCompare()" style="opacity:0.35;cursor:default" disabled>Comparer →</button>
            <button class="rep-delete-sel" id="repDeleteBtn" onclick="App._repDeleteSelected()">Supprimer</button>
            <button class="rep-compare-cancel" onclick="App._repClearSelection()" title="Annuler">✕</button>
          </div>
          <div class="rep-folders-area">
            ${foldersHtml}
            <button class="rep-new-folder-btn" onclick="App._repShowNewFolderOverlay()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
              Nouveau dossier…
            </button>
          </div>
        </div>

        <div>
          <div class="rep-section-title">Données</div>
          <div class="rep-data-bar">
            <button class="rep-data-btn" onclick="App.repExport()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Exporter
            </button>
            <button class="rep-data-btn" onclick="App.repImport()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Importer
            </button>
          </div>
        </div>

      </div>
    `;
    // Keep selection state valid after re-render (remove ids no longer in DOM)
    this._repSelectedIds = this._repSelectedIds.filter(id =>
      !!document.querySelector(`.rep-word-row[data-word-id="${id}"]`)
    );
  },

  _repFormatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'à l\'instant';
    if (diff < 3600) return `il y a ${Math.floor(diff/60)} min`;
    if (diff < 86400) return `il y a ${Math.floor(diff/3600)} h`;
    if (diff < 86400 * 7) return `il y a ${Math.floor(diff/86400)} j`;
    return d.toLocaleDateString('fr-CA', { day: 'numeric', month: 'short' });
  },

  _repToggleFolder(folderId) {
    if (this._repOpenFolders.has(folderId)) {
      this._repOpenFolders.delete(folderId);
    } else {
      this._repOpenFolders.add(folderId);
    }
    const body = document.querySelector(`#repFolder_${folderId} .rep-folder-body`);
    const chev = document.querySelector(`#repFolder_${folderId} .rep-folder-chev`);
    if (body) body.classList.toggle('open');
    if (chev) chev.classList.toggle('open');
  },

  _repDeleteFolderConfirm(folderId) {
    const folder = this._repertoire.folders.find(f => f.id === folderId);
    if (!folder) return;
    const count = this._repertoire.words.filter(w => w.folderId === folderId).length;
    const msg = count > 0
      ? `Supprimer le dossier "${folder.name}" ? Les ${count} mot(s) seront déplacés dans "Mes mots".`
      : `Supprimer le dossier "${folder.name}" ?`;
    if (confirm(msg)) this.repDeleteFolder(folderId);
  },

  _repShowNewFolderOverlay() {
    const EMOJIS = ['📁','📂','🗂️','⭐','🔤','💬','🎯','🧠','💡','🎵','🏷️','📌'];
    let selectedEmoji = '📁';
    const overlay = document.createElement('div');
    overlay.className = 'rep-overlay';
    overlay.id = 'repOverlay';
    overlay.innerHTML = `
      <div class="rep-overlay-panel">
        <div class="rep-overlay-title">Nouveau dossier</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">
          ${EMOJIS.map(e => `<button onclick="App._repSelectEmoji(this,'${e}')" style="background:${e===selectedEmoji?'rgba(20,184,166,0.2)':'var(--surface)'};border:1px solid ${e===selectedEmoji?'#14B8A6':'var(--border)'};border-radius:8px;padding:6px 10px;cursor:pointer;font-size:18px;transition:all 0.15s">${e}</button>`).join('')}
        </div>
        <input class="rep-overlay-input" id="repFolderNameInput" type="text" placeholder="Nom du dossier…" maxlength="30" autocomplete="off">
        <button class="rep-overlay-confirm" onclick="App._repConfirmNewFolder()">Créer le dossier</button>
        <button class="rep-overlay-cancel" onclick="App._repCloseOverlay()">Annuler</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) App._repCloseOverlay(); });
    setTimeout(() => document.getElementById('repFolderNameInput')?.focus(), 100);
    this._repSelectedEmoji = selectedEmoji;
  },

  _repSelectEmoji(btn, emoji) {
    this._repSelectedEmoji = emoji;
    document.querySelectorAll('#repOverlay button[onclick*="_repSelectEmoji"]').forEach(b => {
      b.style.background = 'var(--surface)';
      b.style.borderColor = 'var(--border)';
    });
    btn.style.background = 'rgba(20,184,166,0.2)';
    btn.style.borderColor = '#14B8A6';
  },

  _repConfirmNewFolder() {
    const input = document.getElementById('repFolderNameInput');
    const name = (input?.value || '').trim();
    if (!name) { input?.focus(); return; }
    this.repCreateFolder(name, this._repSelectedEmoji || '📁');
    this._repCloseOverlay();
    this.renderRepertoire();
    this.showToast(`Dossier "${name}" créé ✓`);
  },

  _repShowSaveOverlay(word, ipa) {
    const folders = this._repertoire.folders;
    const overlay = document.createElement('div');
    overlay.className = 'rep-overlay';
    overlay.id = 'repOverlay';
    overlay.innerHTML = `
      <div class="rep-overlay-panel">
        <div class="rep-overlay-title">Sauvegarder dans Le Répertoire</div>
        <div class="rep-overlay-subtitle" style="font-weight:700;font-size:16px;color:var(--text);margin-bottom:2px">${word}</div>
        ${ipa ? `<div class="rep-overlay-subtitle" style="font-family:var(--font-display);font-size:12px;color:#14B8A6;margin-bottom:8px">${ipa}</div>` : ''}
        <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Choisir un dossier :</div>
        ${folders.map(f => `
          <button class="rep-overlay-folder-btn" onclick="App._repConfirmSave('${word.replace(/'/g,"\\'")}','${(ipa||'').replace(/'/g,"\\'")}','${f.id}')">
            <span>${f.emoji}</span> ${f.name}
            <span style="margin-left:auto;font-size:11px;color:var(--text3)">${this._repertoire.words.filter(w=>w.folderId===f.id).length} mot${this._repertoire.words.filter(w=>w.folderId===f.id).length!==1?'s':''}</span>
          </button>`).join('')}
        <button class="rep-overlay-folder-btn" onclick="App._repShowNewFolderFromSave('${word.replace(/'/g,"\\'")}','${(ipa||'').replace(/'/g,"\\'")}')" style="border-style:dashed;color:var(--text3)">
          <span>📁</span> Nouveau dossier…
        </button>
        <button class="rep-overlay-cancel" onclick="App._repCloseOverlay()">Annuler</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) App._repCloseOverlay(); });
  },

  _repShowMoveOverlay(wordId) {
    const wordEntry = this._repertoire.words.find(w => w.id === wordId);
    if (!wordEntry) return;
    const folders = this._repertoire.folders.filter(f => f.id !== wordEntry.folderId);
    const overlay = document.createElement('div');
    overlay.className = 'rep-overlay';
    overlay.id = 'repOverlay';
    overlay.innerHTML = `
      <div class="rep-overlay-panel">
        <div class="rep-overlay-title">Déplacer</div>
        <div class="rep-overlay-subtitle">"${wordEntry.word}" → choisir un dossier :</div>
        ${folders.map(f => `
          <button class="rep-overlay-folder-btn" onclick="App.repMoveWord('${wordId}','${f.id}');App._repCloseOverlay()">
            <span>${f.emoji}</span> ${f.name}
          </button>`).join('')}
        <button class="rep-overlay-cancel" onclick="App._repCloseOverlay()">Annuler</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) App._repCloseOverlay(); });
  },

  _repShowNewFolderFromSave(word, ipa) {
    this._repCloseOverlay();
    const EMOJIS = ['📁','📂','🗂️','⭐','🔤','💬','🎯','🧠','💡','🎵','🏷️','📌'];

  // ── RÉPERTOIRE LONG-PRESS + SELECTION ───────────────────────
  _repSelectedIds: [],

  _repToggleSelect(row) {
    const id = row.dataset.wordId;
    if (!id) return;
    const alreadySelected = row.classList.contains('rep-selected');

    if (alreadySelected) {
      row.classList.remove('rep-selected');
      this._repSelectedIds = this._repSelectedIds.filter(x => x !== id);
    } else {
      row.classList.add('rep-selected');
      this._repSelectedIds.push(id);
    }

    this._repUpdateCompareBar();
  },

  _repUpdateCompareBar() {
    const bar = document.getElementById('repCompareBar');
    const label = document.getElementById('repCompareLabel');
    const cmpBtn = document.getElementById('repCompareBtn');
    const delBtn = document.getElementById('repDeleteBtn');
    if (!bar) return;
    const n = this._repSelectedIds.length;

    // Pick mode: any row can be single-tapped when n >= 1
    document.querySelectorAll('.rep-word-list').forEach(list => {
      list.classList.toggle('rep-pick-mode', n >= 1);
    });

    if (n === 0) {
      bar.classList.remove('visible');
      return;
    }

    bar.classList.add('visible');

    // Label
    if (label) {
      if (n === 1) {
        const w = this._repertoire.words.find(x => x.id === this._repSelectedIds[0]);
        label.textContent = w ? `"${w.word}"` : '1 sélectionné';
      } else {
        label.textContent = `${n} mots sélectionnés`;
      }
    }

    // Compare button: visible only at exactly 2, greyed at 1
    if (cmpBtn) {
      if (n === 1) {
        cmpBtn.style.display = '';
        cmpBtn.disabled = true;
        cmpBtn.style.opacity = '0.35';
        cmpBtn.style.cursor = 'default';
      } else if (n === 2) {
        cmpBtn.style.display = '';
        cmpBtn.disabled = false;
        cmpBtn.style.opacity = '';
        cmpBtn.style.cursor = '';
      } else {
        cmpBtn.style.display = 'none';
      }
    }

    // Delete button: always shown when n >= 1
    if (delBtn) {
      delBtn.textContent = n === 1 ? 'Supprimer' : `Supprimer (${n})`;
    }
  },

  _repClearSelection() {
    this._repSelectedIds.forEach(id => {
      const row = document.querySelector(`.rep-word-row[data-word-id="${id}"]`);
      if (row) row.classList.remove('rep-selected');
    });
    this._repSelectedIds = [];
    this._repUpdateCompareBar();

  _repLaunchCompare() {
    if (this._repSelectedIds.length !== 2) return;
    const [w1, w2] = this._repSelectedIds.map(id => this._repertoire.words.find(x => x.id === id)).filter(Boolean);
    if (!w1 || !w2) return;
    this._repClearSelection();
    this._wfFromBilan = false;
    this.navigate('word-focus', { word: w1.word, compareWord: w2.word });

  // ── WF RHYMES ────────────────────────────────────────────────
  _wfRhymesCache: {}, // word → [{word, ipa}]

  async _wfFetchRhymes() {
    const word = this._wfCurrentWord;
    const ipa  = this._wfCurrentIpa;
    if (!word) return;

    const slot = document.getElementById('wfRhymesSlot');
    const btn  = document.getElementById('wfRhymesBtn');

    // If already cached, just toggle display
    if (this._wfRhymesCache[word]) {
      if (slot && slot.children.length > 0) {
        slot.innerHTML = '';
        if (btn) btn.classList.remove('loading');
      } else {
        this._wfRenderRhymes(word, this._wfRhymesCache[word]);
      }
      return;
    }

    if (!this.settings.openrouterKey) {
      this.showToast('Ajoutez une clé OpenRouter dans les Paramètres pour les rimes IA.');
      return;
    }

    // Show loading state
    if (btn) btn.classList.add('loading');
    if (slot) slot.innerHTML = `<div class="wf-rhymes-strip"><div style="color:rgba(251,191,36,0.6);font-size:12px;padding:4px 0">Recherche de rimes…</div></div>`;

    // Build IPA rhyme tail: last vowel cluster + everything after
    const ipaCore = ipa ? ipa.replace(/^\/|\/$/g, '') : '';
    const vowels = 'aàâæeéèêëiîïoôœøuùûüyɑɛɔœəɐɪʊɥɛ̃ɔ̃ɑ̃œ̃';
    const vowelRe = new RegExp(`[${vowels}][^]*$`);
    const rhymeTail = ipaCore ? (ipaCore.match(vowelRe)?.[0] || ipaCore) : '';
    const rhymeHint = ipaCore
      ? `"${word}" se prononce /${ipaCore}/ en IPA. La terminaison sonore à faire rimer est : /${rhymeTail}/.`
      : `Le mot cible est "${word}".`;

    const prompt = `Tu es un expert en versification et phonétique françaises. ${rhymeHint}

ÉTAPE 1 — ANALYSE (raisonne à voix haute en 2-3 lignes) :
Quelle est la terminaison sonore exacte de "${word}" ? (voyelle + coda)
Quels mots français partagent cette même terminaison sonore ?
Élimine tout candidat dont la coda finale diffère (ex: /ɛj/ ≠ /ɛl/).

ÉTAPE 2 — SÉLECTION FINALE :
Retiens exactement 6 mots. Priorité : même coda exacte. Si moins de 6, complète avec coda très proche.
Ne laisse jamais la liste vide.

EXEMPLES CORRECTS :
- sel /sɛl/ → belle /bɛl/ ✓, celle /sɛl/ ✓, nouvelle /nuvɛl/ ✓ — tous finissent en /ɛl/
- sel /sɛl/ → pareil /paʁɛj/ ✗ — coda /j/ ≠ /l/, EXCLURE
- chien /ʃjɛ̃/ → bien /bjɛ̃/ ✓, ancien /ɑ̃sjɛ̃/ ✓ — tous finissent en /jɛ̃/

RÉPONSE FORMAT : D'abord ton analyse (texte libre), puis le JSON sur une nouvelle ligne :
{"rhymes":[{"word":"...","ipa":"/.../","match":"terminaison /xx/ commune"},{"word":"...","ipa":"/.../","match":"..."},{"word":"...","ipa":"/.../","match":"..."},{"word":"...","ipa":"/.../","match":"..."},{"word":"...","ipa":"/.../","match":"..."},{"word":"...","ipa":"/.../","match":"..."}]}`;

    try {
      const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.settings.openrouterKey,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
        },
        body: JSON.stringify({
          model: this.settings.rhymesModel || this.settings.openrouterModel,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 600,
        }),
      });
      const data = await resp.json();
      let text = data.choices?.[0]?.message?.content?.trim() || '';
      // Robustly extract the JSON object — find the first { ... } block
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('No JSON found in response');
      const parsed = JSON.parse(jsonMatch[0]);
      const rhymes = (parsed.rhymes || []).slice(0, 6).filter(r => r.word);
      this._wfRhymesCache[word] = rhymes;
      this._wfRenderRhymes(word, rhymes);
    } catch(e) {
      if (slot) slot.innerHTML = `<div class="wf-rhymes-strip"><div style="color:rgba(251,191,36,0.5);font-size:12px">Impossible de trouver des rimes.</div></div>`;
    }
    if (btn) btn.classList.remove('loading');
  },

  _wfRenderRhymes(word, rhymes) {
    const slot = document.getElementById('wfRhymesSlot');
    if (!slot) return;
    if (!rhymes || rhymes.length === 0) {
      slot.innerHTML = `<div class="wf-rhymes-strip"><div style="color:rgba(251,191,36,0.5);font-size:12px">Aucune rime trouvée.</div></div>`;

    const chips = rhymes.map(r => `
      <div class="wf-rhyme-chip" onclick="App._wfFromBilan=false;App.wfLoadRhymeWord('${r.word.replace(/'/g,"\\'")}')" title="${r.match ? r.match.replace(/"/g,'&quot;') : ''}">
        ${r.word}
        ${r.ipa ? `<span class="wf-rhyme-chip-ipa">${r.ipa}</span>` : ''}
      </div>`).join('');
    slot.innerHTML = `
      <div class="wf-rhymes-strip">
        <div class="wf-rhymes-header">
          <span class="wf-rhymes-title">✦ Rimes pour « ${word} »</span>

  _setupPassageSwipe() {
    const wrap = document.getElementById('readPassageWrap');
    if (!wrap) return;
    let startX = 0, startY = 0;
    wrap.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    wrap.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
      const phonemeId = wrap.dataset.phoneme;
      const idx = parseInt(wrap.dataset.idx);
      const hasAi = wrap.dataset.hasai === 'true';
      const maxIdx = hasAi ? 5 : 4;
      if (dx < 0) { if (idx < maxIdx) App.swapPassageInPlace(phonemeId, idx + 1); }
      else        { if (idx > 0)      App.swapPassageInPlace(phonemeId, idx - 1); }
    }, { passive: true });
  },

  // Swap passage card + number strip without redrawing the whole screen
  swapPassageInPlace(phonemeId, newIdx) {
    const shade = this.getPhonemeShade(phonemeId);
    const passages = this.getPassages(phonemeId);
    const hasKey = !!this.settings.openrouterKey;
    const hasAi = !!this.aiPassages[phonemeId];
    const showAiBtn = hasKey || hasAi;
    const isAiSlot = newIdx === 5;
    const maxIdx = showAiBtn ? 5 : 4;

    // If navigating to AI slot but no passage yet, trigger generation instead
    if (isAiSlot && !hasAi && hasKey) {
      this.generateAiPassage(phonemeId);
      return;
    }

    const passage = passages[newIdx];
    if (!passage) return;

    this.currentPassageIndex = newIdx;

    // ── Bilan strip (if we're on the bilan screen — handled by selectBilanPassage) ──
    const bilanStrip = document.getElementById('bilanNumStrip');
    if (bilanStrip) return;

    // ── Read strip ──
    const strip = document.getElementById('readNumStrip');
    if (strip) strip.innerHTML = this._buildReadStrip(phonemeId, newIdx, shade, showAiBtn);

    // Update passage wrap
    const wrap = document.getElementById('readPassageWrap');
    if (wrap) {
      wrap.dataset.idx = newIdx;
      wrap.dataset.hasai = showAiBtn;

      // Left chevron
      const chevL = wrap.querySelector('.read-chev-l');
      if (chevL) {
        chevL.className = `read-chev read-chev-l${newIdx === 0 ? ' invisible' : ''}`;
        chevL.onclick = () => App.swapPassageInPlace(phonemeId, newIdx - 1);
      }

      // Right chevron
      const chevR = wrap.querySelector('.read-chev-r');
      if (chevR) {
        const atEnd = newIdx >= maxIdx;
        chevR.className = `read-chev read-chev-r${atEnd ? ' invisible' : ''}`;
        chevR.onclick = () => App.swapPassageInPlace(phonemeId, newIdx + 1);
      }

      // Swap card content
      const card = wrap.querySelector('.passage-card');
      if (card) {
        card.className = `passage-card${isAiSlot ? ' bonus-passage' : ''}`;
        const textEl = card.querySelector('#passageText');
        if (textEl) textEl.innerHTML = this.highlightPassage(passage.text, phonemeId);

        // Badge
        const badge = card.querySelector('.bonus-badge');
        if (isAiSlot && !badge) {
          const b = document.createElement('div');
          b.className = 'bonus-badge';
          b.style.color = '#F59E0B';
          b.textContent = '✨ Passage IA';
          card.prepend(b);
        } else if (!isAiSlot && badge) {
          badge.remove();
        }

        // Regen button in actions
        const actions = card.querySelector('.passage-actions');
        if (actions) {
          const existingRegen = actions.querySelector('#readAiRegen');
          if (isAiSlot && hasKey && !existingRegen) {
            const btn = document.createElement('button');
            btn.className = 'generate-btn'; btn.id = 'readAiRegen'; btn.title = 'Régénérer (IA)';
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;
            btn.onclick = () => App.generateAiPassage(phonemeId);
            actions.appendChild(btn);
          } else if (!isAiSlot && existingRegen) {
            existingRegen.remove();
          }
        }
      }
    }

    // Reset recording UI
    const scoreArea = document.getElementById('scoreArea');
    const playbackArea = document.getElementById('playbackArea');
    const status = document.getElementById('recordingStatus');
    if (scoreArea) { scoreArea.classList.add('hidden'); scoreArea.innerHTML = ''; }
    if (playbackArea) playbackArea.classList.add('hidden');
    if (status) { status.classList.add('hidden'); status.innerHTML = ''; }
    const recordBtn = document.getElementById('recordBtn');
    if (recordBtn) {
      recordBtn.disabled = false;
      const lbl = recordBtn.querySelector('.record-label');
      if (lbl) lbl.textContent = 'Enregistrer ma lecture';
      recordBtn.onclick = () => App.toggleRecording(phonemeId, 'read', newIdx);
    }
  },

  async generateAiPassage(phonemeId) {
    if (!this.settings.openrouterKey) return;
    const p = APP_DATA.phonemes[phonemeId];

    // Show loading state on the AI button
    const aiBtn = document.getElementById('readAiBtn');
    if (aiBtn) { aiBtn.disabled = true; aiBtn.style.opacity = '0.4'; aiBtn.textContent = '…'; }

    // Build a phoneme-specific few-shot example from the phoneme's own passages
    // Use passage[1] and passage[2] as concrete examples of correct length AND sound density
    const passages = APP_DATA.phonemes[phonemeId]?.passages || [];
    const ex1 = passages[1]?.text || '';
    const ex2 = passages[2]?.text || '';
    const exampleWords = (p.exemples || []).join(', ');

    const systemPrompt = `Tu génères de courts passages de pratique de prononciation française (canadienne). Règles strictes :
- 2 à 3 phrases courtes, 30 à 50 mots au total
- Texte brut uniquement, pas de markdown
- OBJECTIF PRINCIPAL : faire rimer ou résonner le son ${p.ipa} (${p.label}) — le passage doit en être SATURÉ. Vise au moins 6 à 8 mots contenant ce son.
- Graphies cibles à utiliser : ${p.graphies.join(', ')}
- Mots de référence pour ce son : ${exampleWords}
- Tu peux utiliser quelques mots de liaison neutres pour que les phrases aient du sens, mais le son ${p.ipa} doit dominer
- Varie les mots : ne répète pas les mots des exemples ci-dessous

Exemples de passages bien construits pour ce son :

Exemple A : ${ex1}

Exemple B : ${ex2}

Génère un NOUVEAU passage de même longueur, fortement concentré sur le son ${p.ipa}, avec des mots qui résonnent ensemble. Réponds avec UNIQUEMENT le texte du passage.`;

    try {
      const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + this.settings.openrouterKey, 'Content-Type': 'application/json', 'HTTP-Referer': window.location.href },
        body: JSON.stringify({
          model: this.settings.openrouterModel,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: 'Génère un nouveau passage.' }
          ],
          max_tokens: 130,
        }),
      });
      const data = await resp.json();
      const text = data.choices?.[0]?.message?.content?.trim().replace(/\*/g, '').replace(/_{1,2}([^_]+)_{1,2}/g, '$1').trim();
      if (text) {
        this.aiPassages[phonemeId] = text;
        this.saveAiPassages();
        // Swap to slot 5 in-place
        this.swapPassageInPlace(phonemeId, 5);
      }
    } catch(e) {
      console.error('AI passage error:', e);
    }
    const aiBtn2 = document.getElementById('readAiBtn');
    if (aiBtn2) { aiBtn2.disabled = false; aiBtn2.style.opacity = ''; aiBtn2.textContent = 'IA'; }
  },

        <div class="screen-title" style="color:${shade.accent}">Comparer</div>

      <div class="compare-container">${compareHtml}</div>

          if (ct) ct.textContent = ta.value.length;
        });
        const footer = card.querySelector('[style*="flex"]');
        if (footer) card.insertBefore(ta, footer);
        else card.appendChild(ta);
      }
      return;
    }
    const words = this._libreWords || [];
    const wordScores = {};
    words.forEach(w => {
      const pa = w.PronunciationAssessment;
      wordScores[(w.Word||"").toLowerCase()] = {
        score: pa?.AccuracyScore ?? w.AccuracyScore ?? 0,
        error: pa?.ErrorType ?? w.ErrorType ?? "None"
      };
    });
    const text = this.phraseLibreText || '';
    const annotated = text.split(/(\s+)/).map(token => {
      if (/^\s+$/.test(token)) return token;
      const stripped = token.replace(/^[^a-z\u00C0-\u00FF]+/gi,"").replace(/[^a-z\u00C0-\u00FF]+$/gi,"");
      const clean = stripped.toLowerCase();
      const variants = [clean, clean.replace(/\u2019/g,"'"), clean.replace(/'/g,"\u2019"), ...clean.split("-")];
      const data = variants.reduce((f,v) => f||wordScores[v], null);
      const lpAttr = stripped ? `data-wf="${stripped.replace(/"/g,'&quot;')}"` : '';
      if (!data) return `<span class="ann-word ann-neutral ann-tappable" ${lpAttr} onclick="App.speakText('${stripped.replace(/'/g,"\\'")}')"> ${token}</span>`;
      const s = data.score;
      const cls = data.error==="Omission"?"ann-omission":s>=85?"ann-good":s>=65?"ann-ok":"ann-bad";
      const tip = data.error==="Omission"?"Non détecté":`${Math.round(s)}%`;
      return `<span class="ann-word ${cls} ann-tappable" ${lpAttr} onclick="App.speakText('${stripped.replace(/'/g,"\\'")}')"> ${token}<span class="ann-score">${tip}</span></span>`;
    }).join("");
    const overlay = document.createElement("div");
    overlay.className = "annotation-overlay";
    overlay.innerHTML = `<div class="ann-legend"><span class="ann-good ann-legend-item">● Excellent</span><span class="ann-ok ann-legend-item">● À améliorer</span><span class="ann-bad ann-legend-item">● Difficile</span><span class="ann-omission ann-legend-item">● Non détecté</span></div><div class="ann-text">${annotated}</div>`;
    const ta = card.querySelector(".libre-input");
    if (ta) card.replaceChild(overlay, ta);
    else card.prepend(overlay);
  },

  async generateBilanPassage() {
    const btn = document.getElementById('genBtn');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; btn.textContent = '...'; }

    // Few-shot examples anchor the model to the right length (~35–50 words)
    const systemPrompt = `Tu génères de courts passages de pratique de prononciation française (canadienne). Chaque passage : 1 à 3 phrases, 30 à 50 mots au total. Pas de formatage markdown. Texte brut uniquement. Inclus naturellement des voyelles nasales, le son U/EU, le R français et une liaison. Exemples de longueur cible :

Exemple A : « Jean prend un bon repas en plein air : du poulet rôti, des légumes frais et un verre de lait froid. Il mange lentement, puis il dit merci en souriant à son vieux voisin. »

Exemple B : « Tu dis à Didier que tu étudies du thé et du sucre, que tu dînes tôt dans une petite rue du Vieux-Québec, près du fleuve. »

Génère un nouveau passage de longueur similaire. Réponds avec UNIQUEMENT le texte du passage.`;

    try {
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + this.settings.openrouterKey,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
        },
        body: JSON.stringify({
          model: this.settings.openrouterModel,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: 'Génère un nouveau passage.' }
          ],
          max_tokens: 120,
        }),
      });
      const data = await response.json();
      const text = data.choices?.[0]?.message?.content
        ?.trim()
        .replace(/\*/g, '')
        .replace(/_{1,2}([^_]+)_{1,2}/g, '$1')
        .trim();
      if (text) {
        this.bilanAiPassage = text;
        this.bilanPassageIndex = 5;
        this.saveDiagScores();
        // Clear old results so the new passage starts fresh
        this._lastBilanScore = null;
        this._lastBilanPa = null;
        this._lastBilanWords = null;
        this._lastBilanAnnotationOpen = false;
        this._bilanWords = null;
        this.renderBilan();
      } else {
        if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.textContent = 'Réessayer'; }
      }
    } catch(e) {
      console.error('Bilan generation error:', e);
      if (btn) { btn.disabled = false; btn.style.opacity = ''; btn.textContent = 'Réessayer'; }
    }
  },

  processBilanResults(words) {
    const catScores = {};
    const catCounts = {};

    const graphieToCat = {};
    Object.entries(APP_DATA.phonemes).forEach(([id, p]) => {
      p.graphies.forEach(g => { if (g.length >= 2) graphieToCat[g.toLowerCase()] = p.category; });
    });

    words.forEach(w => {
      const wText = (w.Word || '').toLowerCase();
      const wpa = w.PronunciationAssessment;
      const error = wpa?.ErrorType ?? w.ErrorType ?? 'None';
      // Skip pure insertions (Azure hallucinated a word not in the reference)
      if (error === 'Insertion') return;
      // Omissions score 0; all others use raw AccuracyScore
      let score;
      if (error === 'Omission') {
        score = 0;
      } else {
        score = wpa?.AccuracyScore ?? w.AccuracyScore ?? 0;
      }
      
      let cat = 'moyennes'; 
      for (const [graphie, category] of Object.entries(graphieToCat)) {
        if (wText.includes(graphie)) {
          cat = category;
          break;
        }
      }

      if (!catScores[cat]) { catScores[cat] = 0; catCounts[cat] = 0; }
      catScores[cat] += score;
      catCounts[cat]++;
    });

    APP_DATA.categories.forEach(c => {
      if (catCounts[c.id] > 0) {
        const final = Math.round(catScores[c.id] / catCounts[c.id]);
        this.bilanScores[c.id] = final;
        this.bilanBestScores[c.id] = Math.max(final, this.bilanBestScores[c.id] || 0);
      }
    });

    this.saveDiagScores();
  },

  showBilanResults(score, pa, words) {
    this.processBilanResults(words);
    this._bilanWords = words;
    // Store for goBackToBilanResults
    this._lastBilanScore = score;
    this._lastBilanPa = pa;
    this._lastBilanWords = words; 

    const scoreArea = document.getElementById('scoreArea');
    if (scoreArea) {
      scoreArea.classList.remove('hidden');
      const color = this.scoreColor(score);
      const matchedCount = words.filter(w => (w.PronunciationAssessment?.AccuracyScore ?? w.AccuracyScore ?? 0) > 0).length;
      const warningMsg = matchedCount === 0 
        ? `<div style="color:#F87171;font-size:12px;margin-top:8px;">⚠️ Azure n'a pas pu aligner votre voix. Parlez plus distinctement.</div>` 
        : '';

      scoreArea.innerHTML = `
        <div class="score-display">
          <div class="score-ring" style="--score-color:${color}">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
              <circle cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="8"
                stroke-dasharray="${2.51 * score} 251" stroke-linecap="round" transform="rotate(-90 50 50)"/>
            </svg>
            <div class="score-number">${score}<span class="score-pct-sym">%</span></div>
          </div>

          ${warningMsg}
        </div>
        <button class="next-btn" onclick="App.navigate('labo-scores')" style="margin-top:12px">Consulter mon Bilan complet →</button>
      `;
    }
    
    const _pba = document.getElementById('playbackArea');
    const _st = document.getElementById('recordingStatus');
    if (_pba) _pba.classList.add('hidden');
    if (_st) { _st.classList.add('hidden'); _st.innerHTML = ''; }
    const btn = document.getElementById('recordBtn');
    if (btn) {
      btn.disabled = false;
      btn.querySelector('.record-label').textContent = 'Relancer le diagnostic';
    }
    // Enable action buttons now that we have results
    ['eyeBtn','speakerBtn'].forEach(id => {
