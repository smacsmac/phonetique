<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#05060F">
  <title>Phonétique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   PHONÉTIQUE APP — STYLES
   Electric blue/purple dark mode
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

/* ── CSS VARIABLES ─────────────────────────────────────────── */
:root {
  --bg: #05060F;
  --bg2: #0D0F1E;
  --bg3: #131629;
  --surface: #1A1D35;
  --surface2: #222640;
  --border: rgba(99, 102, 241, 0.18);
  --border-bright: rgba(99, 102, 241, 0.4);
  --text: #E8EAF8;
  --text2: #9BA3C4;
  --text3: #5A6080;
  --blue: #4F8EF7;
  --purple: #8B5CF6;
  --electric: #60A5FA;
  --neon-blue: #3B82F6;
  --neon-purple: #7C3AED;
  --glow-blue: rgba(79, 142, 247, 0.3);
  --glow-purple: rgba(139, 92, 246, 0.3);
  --font-display: 'Space Mono', 'Noto Sans', monospace;
  --font-body: 'DM Sans', sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
}

[data-theme="light"] {
  --bg: #F0F2FF;
  --bg2: #E8EAFE;
  --bg3: #DDE0FC;
  --surface: #FFFFFF;
  --surface2: #F5F6FF;
  --border: rgba(99, 102, 241, 0.15);
  --border-bright: rgba(99, 102, 241, 0.35);
  --text: #1A1D35;
  --text2: #4A5080;
  --text3: #8A93B4;
  --glow-blue: rgba(79, 142, 247, 0.15);
  --glow-purple: rgba(139, 92, 246, 0.15);
}

/* ── RESET & BASE ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  height: 100%;
  overflow: hidden;
}

body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(ellipse 600px 400px at 20% 20%, rgba(99,60,220,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 80% 80%, rgba(37,99,235,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 400px 300px at 60% 10%, rgba(139,92,246,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}

#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 0 32px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

#main::-webkit-scrollbar { width: 4px; }
#main::-webkit-scrollbar-track { background: transparent; }
#main::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ── TRANSITIONS ────────────────────────────────────────────── */
.screen-exit {
  animation: screenExit 0.15s ease-in forwards;
}
.screen-enter {
  animation: screenEnter 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes screenExit {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-20px); }
}

@keyframes screenEnter {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── SHARED HEADER ──────────────────────────────────────────── */
.screen-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(180deg, var(--bg) 80%, transparent 100%);
}

.screen-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex: 1;
  text-align: right;
  color: var(--text2);
}

.home-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}
.home-btn:hover { border-color: var(--border-bright); background: var(--surface2); }

.logo-ph {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--electric);
  letter-spacing: -0.02em;
}
.logo-onetique {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--purple);
  letter-spacing: -0.02em;
}

.back-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--border-bright); color: var(--text); }
.back-btn svg { width: 18px; height: 18px; }

.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.2s;
}
.lang-flags {
  display: flex;
  gap: 4px;
  align-items: center;
}
.flag-btn {
  background: none;
  border: 1px solid transparent;
  padding: 0;
  cursor: pointer;
  border-radius: 3px;
  transition: filter 0.2s, border-color 0.2s;
  overflow: hidden;
  width: 28px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  filter: grayscale(1) brightness(0.45);
}
.flag-btn.active { filter: none; border-color: rgba(255,255,255,0.3); }
.flag-btn:hover:not(.active) { filter: grayscale(0.2) brightness(0.85); }

.icon-btn:hover { border-color: var(--border-bright); color: var(--text); background: var(--surface2); }
.icon-btn svg { width: 16px; height: 16px; }

/* ── HOME ───────────────────────────────────────────────────── */
.home-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 24px 20px 8px;
}

.app-logo {
  display: flex;
  flex-direction: column;
}

.app-logo .logo-ph {
  font-size: 28px;
  background: linear-gradient(135deg, #60A5FA 0%, #8B5CF6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-logo .logo-onetique {
  font-size: 28px;
  background: linear-gradient(135deg, #60A5FA 0%, #8B5CF6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: inline;
}

.app-logo > *:first-child {
  display: flex;
  align-items: baseline;
  gap: 0;
}

.logo-tagline {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: 0.02em;
}

.header-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px 20px 24px;
}

.category-tile {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 16px 22px;
  text-align: left;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 130px;
}

.category-tile:hover,
.category-tile:active {
  transform: translateY(-3px) scale(1.02);
  border-color: var(--cat-accent);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px color-mix(in srgb, var(--cat-color) 30%, transparent);
}

.cat-icon {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--cat-accent);
  line-height: 1;
  margin-bottom: 2px;
}

.cat-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}

.cat-desc {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.3;
}

.cat-glow {
  position: absolute;
  bottom: -20px;
  right: -20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--cat-color) 0%, transparent 70%);
  opacity: 0.25;
  pointer-events: none;
  transition: opacity 0.3s;
}

.category-tile:hover .cat-glow { opacity: 0.45; }

/* ── PHONEME GRID ────────────────────────────────────────────── */
.phoneme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 8px 20px 24px;
}

.phoneme-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: left;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  overflow: hidden;
}

.phoneme-tile:hover,
.phoneme-tile:active {
  transform: translateY(-2px);
  border-color: var(--cat-accent);
  box-shadow: 0 6px 24px rgba(0,0,0,0.25);
}

.phoneme-ipa {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--cat-accent);
  font-weight: 700;
  letter-spacing: -0.02em;
}

.phoneme-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.phoneme-examples {
  font-size: 11px;
  color: var(--text3);
}

.phoneme-score {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  margin-top: 8px;
}

/* ── PHONEME HERO ────────────────────────────────────────────── */
.phoneme-hero {
  padding: 16px 20px 24px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.phoneme-hero-ipa {
  font-family: var(--font-display);
  font-size: 52px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
  text-shadow: 0 0 40px currentColor;
}

.phoneme-hero-label {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.phoneme-hero-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  max-width: 300px;
  text-align: center;
}

.phoneme-hero-graphies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.graphie-tag {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 10px;
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--text2);
}

/* ── MODE GRID ───────────────────────────────────────────────── */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 4px 20px 24px;
}

.mode-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 16px 20px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
  transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
  min-height: 120px;
}

.mode-tile:hover,
.mode-tile:active {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
}

.mode-practice { --mode-color: #4F8EF7; }
.mode-read     { --mode-color: #8B5CF6; }
.mode-compare  { --mode-color: #06B6D4; }
.mode-test     { --mode-color: #10B981; }

.mode-tile:hover { border-color: var(--mode-color); }
.mode-tile::after {
  content: '';
  position: absolute;
  bottom: -30px; right: -30px;
  width: 90px; height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--mode-color) 0%, transparent 70%);
  opacity: 0.15;
  transition: opacity 0.3s;
}
.mode-tile:hover::after { opacity: 0.3; }

.mode-icon {
  color: var(--mode-color);
  width: 32px; height: 32px;
}
.mode-icon svg { width: 28px; height: 28px; }

.mode-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}

.mode-sub {
  font-size: 11px;
  color: var(--text3);
  line-height: 1.3;
}

/* ── PRACTICE MODE ───────────────────────────────────────────── */
.practice-container {
  padding: 8px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.practice-sound-card {
  background: linear-gradient(135deg, 
    color-mix(in srgb, var(--cat-color) 15%, var(--surface)) 0%,
    var(--surface) 100%);
  border: 1px solid color-mix(in srgb, var(--cat-color) 40%, var(--border));
  border-radius: var(--radius-lg);
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-align: center;
}

.practice-ipa {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 700;
  color: var(--cat-accent);
  text-shadow: 0 0 30px var(--cat-accent);
  line-height: 1;
}

.practice-word {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-top: 4px;
}

.practice-word-ipa {
  font-family: var(--font-display);
  font-size: 14px;
  color: var(--text3);
}

.listen-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: color-mix(in srgb, var(--cat-color) 20%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--cat-color) 40%, transparent);
  border-radius: 100px;
  padding: 10px 24px;
  color: var(--cat-accent);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.listen-btn:hover { background: color-mix(in srgb, var(--cat-color) 30%, var(--surface2)); transform: scale(1.03); }
.listen-btn svg { width: 18px; height: 18px; }

/* ── WORD CAROUSEL ───────────────────────────────────────── */
.word-carousel {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  min-height: 90px;
  position: relative;
}

.carousel-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  overflow: hidden;
}

.carousel-word-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: opacity 0.15s ease;
}

.carousel-word-wrap.slide-exit-left  { animation: slideExitLeft  0.15s ease forwards; }
.carousel-word-wrap.slide-exit-right { animation: slideExitRight 0.15s ease forwards; }
.carousel-word-wrap.slide-enter-right { animation: slideEnterRight 0.25s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
.carousel-word-wrap.slide-enter-left  { animation: slideEnterLeft  0.25s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

@keyframes slideExitLeft  { to { opacity: 0; transform: translateX(-28px); } }
@keyframes slideExitRight { to { opacity: 0; transform: translateX(28px); } }
@keyframes slideEnterRight { from { opacity: 0; transform: translateX(28px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideEnterLeft  { from { opacity: 0; transform: translateX(-28px); } to { opacity: 1; transform: translateX(0); } }

.carousel-arrow {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 12px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
  transition: opacity 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.carousel-arrow:hover  { opacity: 1; }
.carousel-arrow:active { transform: scale(0.88); }
.carousel-arrow svg { width: 32px; height: 32px; filter: drop-shadow(0 0 6px currentColor); }

.carousel-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}
.carousel-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.carousel-dot.active {
  background: var(--cat-accent);
  border-color: var(--cat-accent);
  width: 18px;
  border-radius: 3px;
  box-shadow: 0 0 8px var(--cat-accent);
}

.practice-tips {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tip-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
}

.tip-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
}

.tip-graphies {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

/* ── RECORD BUTTON ───────────────────────────────────────────── */
.record-section, .read-record-section, .test-record-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.record-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 8px;
}

.record-btn-inner {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00F5D4 0%, #2DD4BF 50%, #C084FC 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 0 rgba(0,245,212,0.4);
  transition: all 0.2s;
  position: relative;
}

.record-btn-inner svg {
  width: 30px; height: 30px;
  color: white;
}

.record-btn:hover .record-btn-inner {
  transform: scale(1.08);
  box-shadow: 0 0 0 8px rgba(79,142,247,0.15);
}

.record-btn.recording-active .record-btn-inner {
  background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
  animation: recordPulse 1.2s infinite;
}

.large-record .record-btn-inner {
  width: 88px; height: 88px;
}
.large-record .record-btn-inner svg {
  width: 36px; height: 36px;
}

@keyframes recordPulse {
  0% { box-shadow: 0 0 0 0 rgba(0,245,212,0.5); }
  70% { box-shadow: 0 0 0 16px rgba(0,245,212,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,245,212,0); }
}

.record-label {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
  text-align: center;
}

.record-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.record-btn:disabled .record-btn-inner { animation: none; }

/* ── STATUS & PLAYBACK ───────────────────────────────────────── */
.hidden { display: none !important; }

.recording-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text2);
}

.pulse-dot {
  width: 8px; height: 8px;
  background: #EF4444;
  border-radius: 50%;
  animation: pulseDot 1s infinite;
}

@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.analyzing-dots {
  display: flex;
  gap: 4px;
}
.analyzing-dots span {
  width: 6px; height: 6px;
  background: var(--blue);
  border-radius: 50%;
  animation: analyzeDot 1.2s infinite;
}
.analyzing-dots span:nth-child(2) { animation-delay: 0.2s; }
.analyzing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes analyzeDot {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

.playback-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.playback-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 9px 20px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.playback-btn:hover { border-color: var(--border-bright); color: var(--text); }
.playback-btn svg { width: 14px; height: 14px; }

/* ── SCORE DISPLAY ───────────────────────────────────────────── */
.score-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
}

.score-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.score-ring {
  position: relative;
  width: 110px; height: 110px;
}
.score-ring svg { width: 100%; height: 100%; }
.score-ring circle:last-child {
  transition: stroke-dasharray 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.score-number {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.score-pct-sym {
  font-size: 16px;
}

.score-feedback {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
}

.score-sub-row {
  display: flex;
  gap: 16px;
  justify-content: center;
}
.score-sub {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 16px;
}
.score-sub-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-weight: 700;
}
.score-sub-val {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
}

.score-detail {
  font-size: 12px;
  color: var(--text3);
}

.score-next-hint {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
}

.retry-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 24px;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.retry-btn:hover { border-color: var(--border-bright); color: var(--text); }
.retry-btn svg { width: 14px; height: 14px; }

.next-btn {
  background: linear-gradient(135deg, #4F8EF7 0%, #8B5CF6 100%);
  border: none;
  border-radius: 100px;
  padding: 12px 28px;
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.next-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(79,142,247,0.4); }

.no-azure-msg {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text3);
  text-align: left;
  max-width: 320px;
}
.no-azure-msg svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--blue); }

/* ── READ MODE ───────────────────────────────────────────────── */
.read-container {
  padding: 8px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.passage-dots {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.passage-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.passage-dot.active {
  background: var(--blue);
  border-color: var(--blue);
  width: 24px;
  border-radius: 4px;
}

.passage-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
}

.passage-text {
  font-size: 15px;
  line-height: 1.8;
  color: var(--text);
}

.passage-text mark {
  background: color-mix(in srgb, var(--cat-accent) 25%, transparent);
  color: var(--cat-accent);
  border-radius: 3px;
  padding: 0 1px;
}

.passage-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  justify-content: flex-end;
}

.passage-listen-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--blue);
  transition: all 0.2s;
}
.passage-listen-btn:hover { border-color: var(--blue); background: color-mix(in srgb, var(--blue) 15%, var(--surface2)); }
.passage-listen-btn svg { width: 18px; height: 18px; }

.generate-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--purple);
  transition: all 0.2s;
}
.generate-btn:hover { border-color: var(--purple); background: color-mix(in srgb, var(--purple) 15%, var(--surface2)); }
.generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.generate-btn svg { width: 17px; height: 17px; }

.read-instructions {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  line-height: 1.5;
}

/* ── COMPARE MODE ────────────────────────────────────────────── */
.compare-container {
  padding: 8px 20px 24px;
}

.compare-main {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
}

.compare-vs {
  text-align: center;
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.2em;
  font-weight: 700;
}

.compare-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.compare-card.active-card {
  border-color: color-mix(in srgb, var(--cat-accent) 50%, var(--border));
  background: color-mix(in srgb, var(--cat-color) 8%, var(--surface));
}

.compare-ipa {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--cat-accent);
  line-height: 1;
}

.compare-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.compare-listen {
  display: flex;
  align-items: center;
  gap: 8px;
  background: color-mix(in srgb, var(--cat-accent) 12%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--cat-accent) 30%, transparent);
  border-radius: 100px;
  padding: 8px 18px;
  color: var(--cat-accent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.compare-listen:hover { transform: scale(1.03); }
.compare-listen svg { width: 14px; height: 14px; }

.compare-goto {
  background: transparent;
  border: none;
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0;
  text-align: left;
  transition: color 0.2s;
}
.compare-goto:hover { color: var(--blue); }

.compare-empty {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  color: var(--text3);
  font-size: 14px;
  line-height: 1.5;
}

/* ── TEST MODE ───────────────────────────────────────────────── */
.test-container {
  padding: 8px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.test-instructions {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.test-badge {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  text-shadow: 0 0 24px currentColor;
}

.test-instructions p {
  font-size: 13px;
  color: var(--text2);
}

.test-passage-card {
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--cat-color) 10%, var(--surface)) 0%,
    var(--surface) 100%);
  border: 1px solid color-mix(in srgb, var(--cat-color) 35%, var(--border));
  border-radius: var(--radius-lg);
  padding: 22px;
}

/* ── SCORES SCREEN ───────────────────────────────────────────── */
.scores-container {
  padding: 8px 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.scores-category {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.scores-cat-header {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding-left: 2px;
}

.scores-phoneme-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.score-phoneme-row {
  display: grid;
  grid-template-columns: 56px 1fr 80px 44px;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: background 0.15s;
}
.score-phoneme-row:last-child { border-bottom: none; }
.score-phoneme-row:hover { background: var(--surface2); }

.score-ipa {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
}

.score-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

.score-bar-wrap {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.score-bar {
  display: block;
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.score-pct {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  text-align: right;
}

/* ── SETTINGS ────────────────────────────────────────────────── */
.settings-container {
  padding: 8px 20px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.settings-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.settings-group-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }

.settings-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}
.settings-label svg { width: 16px; height: 16px; color: var(--text3); }

.settings-select {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
}

.settings-field {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.settings-field:last-child { border-bottom: none; }

.field-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.field-label svg { width: 14px; height: 14px; }

.settings-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  width: 100%;
  transition: border-color 0.2s;
}
.settings-input:focus {
  outline: none;
  border-color: var(--border-bright);
}
.settings-input::placeholder { color: var(--text3); }

.toggle {
  position: relative;
  display: inline-block;
  width: 44px; height: 24px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  transition: 0.3s;
}
.toggle-slider::before {
  position: absolute;
  content: '';
  height: 16px; width: 16px;
  left: 3px; bottom: 3px;
  background: var(--text3);
  border-radius: 50%;
  transition: 0.3s;
}
.toggle input:checked + .toggle-slider {
  background: linear-gradient(135deg, #4F8EF7 0%, #8B5CF6 100%);
  border-color: transparent;
}
.toggle input:checked + .toggle-slider::before {
  transform: translateX(20px);
  background: white;
}

.reset-scores-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: color-mix(in srgb, #EF4444 10%, var(--surface));
  border: 1px solid color-mix(in srgb, #EF4444 25%, var(--border));
  border-radius: var(--radius-sm);
  padding: 14px;
  color: #F87171;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.reset-scores-btn:hover { background: color-mix(in srgb, #EF4444 20%, var(--surface)); }
.reset-scores-btn svg { width: 16px; height: 16px; }

/* ── LIAISON HIGHLIGHTS ───────────────────────────────────── */
.liaison-cons {
  color: #FBBF24;
  font-weight: 700;
  border-bottom: 2px solid #FBBF24;
  padding-bottom: 1px;
}
.liaison-vowel {
  color: #60A5FA;
  font-weight: 700;
  border-bottom: 2px solid #60A5FA;
  padding-bottom: 1px;
}

/* ── HOME LOGO (single line) ─────────────────────────────── */
.logo-full {
  display: flex;
  align-items: baseline;
  white-space: nowrap;
}
.app-logo .logo-ph {
  font-size: 26px;
}
.app-logo .logo-onetique {
  font-size: 26px;
}

/* ── SCORES TILE (8th tile) ──────────────────────────────── */
.scores-tile {
  background: linear-gradient(135deg,
    color-mix(in srgb, #1E3A5F 60%, var(--surface)) 0%,
    var(--surface) 100%
  ) !important;
}
.scores-tile:hover, .scores-tile:active {
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px rgba(30,58,95,0.5) !important;
}

/* ── PHRASE LIBRE ────────────────────────────────────────────── */
.libre-container { padding: 8px 20px 32px; display: flex; flex-direction: column; gap: 16px; }
.libre-card { background: linear-gradient(135deg, color-mix(in srgb, var(--cat-color) 15%, var(--surface)) 0%, var(--surface) 100%); border: 1px solid color-mix(in srgb, var(--cat-accent) 30%, var(--border)); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.libre-prompt { font-size: 13px; color: var(--text2); font-weight: 500; }
.libre-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; color: var(--text); font-family: var(--font-body); font-size: 16px; line-height: 1.5; resize: none; min-height: 110px; width: 100%; transition: border-color 0.2s; }
.libre-input:focus { outline: none; border-color: #48CAE4; }
.libre-input::placeholder { color: var(--text3); }
.libre-chars { font-size: 11px; color: var(--text3); text-align: right; }
.libre-actions { display: flex; justify-content: center; }

/* ── RÉPERTOIRE ─────────────────────────────────────────────── */
.repertoire-container {
  padding: 8px 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.rep-section-title {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  margin-bottom: 2px;
}

/* ── Recent words strip ── */
.rep-recent-strip {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 4px 0 10px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.rep-recent-strip::-webkit-scrollbar { display: none; }

.rep-recent-card {
  flex: 0 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  min-width: 110px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.rep-recent-card::after {
  content: '';
  position: absolute;
  bottom: -20px; right: -20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, #14B8A6 0%, transparent 70%);
  opacity: 0.12;
}
.rep-recent-card:hover { border-color: #14B8A6; transform: translateY(-2px); }
.rep-recent-word {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}
.rep-recent-ipa {
  font-family: var(--font-display);
  font-size: 10px;
  color: #14B8A6;
}
.rep-recent-date {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
}
.rep-empty-recent {
  color: var(--text3);
  font-size: 13px;
  padding: 16px 0;
  font-style: italic;
}

.rep-recent-action-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(20,184,166,0.1);
  border: 1px solid rgba(20,184,166,0.35);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  margin-bottom: 8px;
}

.rep-recent-card.rep-recent-selected {
  border-color: #14B8A6;
  box-shadow: 0 0 0 2px rgba(20,184,166,0.25);
  background: rgba(20,184,166,0.1);
}
.rep-recent-card.lp-active-recent {
  transform: scale(0.96);
  border-color: rgba(20,184,166,0.5);
}

/* ── Folder system ── */
.rep-folders-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.rep-folder {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.rep-folder:hover { border-color: var(--border-bright); }

.rep-folder-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}
.rep-folder-icon {
  font-size: 18px;
  line-height: 1;
}
.rep-folder-name {
  flex: 1;
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}
.rep-folder-count {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border-radius: 100px;
  padding: 2px 8px;
}
.rep-folder-chev {
  color: var(--text3);
  transition: transform 0.25s;
  width: 16px; height: 16px;
}
.rep-folder-chev.open { transform: rotate(90deg); }

.rep-folder-body {
  display: none;
  border-top: 1px solid var(--border);
}
.rep-folder-body.open { display: block; }

.rep-word-list {
  padding: 8px 0;
}
.rep-word-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  transition: background 0.15s, border-color 0.2s, box-shadow 0.2s;
  border-radius: 8px;
  margin: 2px 8px;
  border: 1px solid transparent;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}
.rep-word-row.lp-active-row {
  border-color: rgba(20,184,166,0.5);
  box-shadow: 0 0 0 2px rgba(20,184,166,0.15);
  background: rgba(20,184,166,0.06);
}
.rep-word-row.rep-selected {
  border-color: #14B8A6;
  box-shadow: 0 0 0 2px rgba(20,184,166,0.25);
  background: rgba(20,184,166,0.08);
}
.rep-word-text {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
}
.rep-word-ipa {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text2);
}
.rep-word-quick-btns {
  display: flex;
  gap: 4px;
  align-items: center;
}
.rep-play-btn {
  background: none;
  border: none;
  padding: 5px;
  cursor: pointer;
  color: #14B8A6;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}
.rep-play-btn:hover { background: rgba(20,184,166,0.15); }
.rep-play-btn svg { width: 14px; height: 14px; }

.rep-word-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}
.rep-word-delete {
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: var(--text3);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}
.rep-word-delete:hover { color: #F87171; background: rgba(248,113,113,0.1); }
.rep-word-delete svg { width: 14px; height: 14px; }

.rep-move-btn {
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: var(--text3);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s;
}
.rep-move-btn:hover { color: #14B8A6; background: rgba(20,184,166,0.1); }
.rep-move-btn svg { width: 14px; height: 14px; }

/* Context actions bar — shown after long press */
.rep-word-ctx {
  display: none;
  gap: 6px;
}
.rep-word-row.rep-selected .rep-word-ctx { display: flex; }
.rep-word-row.rep-selected .rep-word-quick-btns { display: none; }

/* Compare bar — shown when 2 words selected */
.rep-compare-bar {
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(20,184,166,0.12);
  border: 1px solid rgba(20,184,166,0.4);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: 0 0 4px;
}
.rep-compare-bar.visible { display: flex; }
.rep-compare-bar-label {
  flex: 1;
  font-size: 13px;
  color: #14B8A6;
  font-weight: 600;
}
.rep-compare-go {
  background: #14B8A6;
  border: none;
  border-radius: 8px;
  padding: 7px 12px;
  color: #05060F;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-body);
  transition: opacity 0.2s;
  white-space: nowrap;
}
.rep-compare-go:hover:not(:disabled) { opacity: 0.85; }
.rep-delete-sel {
  background: rgba(248,113,113,0.15);
  border: 1px solid rgba(248,113,113,0.35);
  border-radius: 8px;
  padding: 7px 12px;
  color: #F87171;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
  white-space: nowrap;
}
.rep-delete-sel:hover { background: rgba(248,113,113,0.25); }
.rep-compare-cancel {
  background: none;
  border: none;
  padding: 6px;
  cursor: pointer;
  color: var(--text3);
  font-size: 18px;
  line-height: 1;
  transition: color 0.15s;
}
.rep-compare-cancel:hover { color: var(--text); }

/* Pick-mode: one word selected, waiting for 2nd tap */
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected) {
  cursor: pointer;
  border-color: rgba(20,184,166,0.15);
}
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected):hover {
  border-color: rgba(20,184,166,0.45);
  background: rgba(20,184,166,0.04);
}
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected) .rep-play-btn,
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected) .rep-word-quick-btns,
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected) .rep-word-ctx {
  opacity: 0.25;
  pointer-events: none;
}
.rep-word-list.rep-pick-mode .rep-word-row:not(.rep-selected) .rep-word-text {
  pointer-events: none;
}

.rep-folder-empty {
  padding: 14px 16px;
  color: var(--text3);
  font-size: 13px;
  font-style: italic;
}

/* ── New folder button ── */
.rep-new-folder-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  border: 1px dashed var(--border-bright);
  border-radius: var(--radius);
  padding: 12px 16px;
  cursor: pointer;
  color: var(--text3);
  font-size: 13px;
  font-family: var(--font-body);
  transition: all 0.2s;
  width: 100%;
}
.rep-new-folder-btn:hover { border-color: #14B8A6; color: #14B8A6; background: rgba(20,184,166,0.04); }
.rep-new-folder-btn svg { width: 16px; height: 16px; }

/* ── Export / Import bar ── */
.rep-data-bar {
  display: flex;
  gap: 8px;
  padding: 0;
}
.rep-data-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font-body);
  font-weight: 600;
  color: var(--text2);
  transition: all 0.2s;
}
.rep-data-btn:hover { border-color: #14B8A6; color: #14B8A6; }
.rep-data-btn svg { width: 14px; height: 14px; }

/* ── Rep-nav button — jumps to Répertoire folder for current word ── */
.wf-rep-nav-btn {
  position: absolute;
  top: 12px;
  right: 58px; /* sits left of the 38px save btn + 8px gap */
  background: rgba(20,184,166,0.08);
  border: 1.5px solid rgba(20,184,166,0.2);
  border-radius: 10px;
  width: 34px; height: 34px;
  display: flex; /* always visible when word is loaded */
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(20,184,166,0.45);
  opacity: 0.6;
}
.wf-rep-nav-btn:hover { background: rgba(20,184,166,0.18); border-color: #14B8A6; color: #14B8A6; opacity: 1; }
.wf-rep-nav-btn.visible { color: #14B8A6; border-color: rgba(20,184,166,0.5); opacity: 1; }
.wf-rep-nav-btn svg { width: 15px; height: 15px; }

/* ── Save-to-workbook button on Mot en Focus ── */
.wf-save-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(20,184,166,0.1);
  border: 1.5px solid rgba(20,184,166,0.35);
  border-radius: 10px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  color: #14B8A6;
  gap: 0;
}
.wf-save-btn:hover { background: rgba(20,184,166,0.22); border-color: #14B8A6; transform: scale(1.08); }
.wf-save-btn.saved { background: #14B8A6; border-color: #14B8A6; color: #05060F; }
.wf-save-btn svg { width: 17px; height: 17px; }

/* ── Compare pill button — bottom-right of word card ── */
.wf-compare-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(20,184,166,0.08);
  border: 1.5px solid rgba(20,184,166,0.25);
  border-radius: 20px;
  padding: 5px 10px 5px 7px;
  display: flex; align-items: center; gap: 5px;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(20,184,166,0.7);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
}
.wf-compare-btn:hover { background: rgba(20,184,166,0.18); border-color: #14B8A6; color: #14B8A6; }
.wf-compare-btn svg { width: 13px; height: 13px; }
.wf-compare-btn.active { background: rgba(20,184,166,0.15); border-color: #14B8A6; color: #14B8A6; }

/* ── Rhymes pill button — bottom-left of word card ── */
.wf-rhymes-btn {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(251,191,36,0.08);
  border: 1.5px solid rgba(251,191,36,0.3);
  border-radius: 20px;
  padding: 5px 10px 5px 7px;
  display: flex; align-items: center; gap: 5px;
  cursor: pointer;
  transition: all 0.2s;
  color: rgba(251,191,36,0.8);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
}
.wf-rhymes-btn:hover { background: rgba(251,191,36,0.15); border-color: #FBBF24; color: #FBBF24; }
.wf-rhymes-btn svg { width: 13px; height: 13px; }
.wf-rhymes-btn.loading { opacity: 0.6; cursor: wait; }

/* ── Rhymes result strip ── */
.wf-rhymes-strip {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px 16px 4px;
  animation: fadeInRhymes 0.3s ease both;
}
@keyframes fadeInRhymes {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.wf-rhymes-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.wf-rhymes-title {
  font-size: 9px;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #FBBF24;
}
.wf-rhymes-dismiss {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s;
}
.wf-rhymes-dismiss:hover { color: var(--text); }
.wf-rhymes-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.wf-rhyme-chip {
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.25);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.wf-rhyme-chip:hover { background: rgba(251,191,36,0.15); border-color: #FBBF24; color: #FBBF24; transform: translateY(-1px); }
.wf-rhyme-chip-ipa {
  font-family: var(--font-display);
  font-size: 10px;
  color: rgba(251,191,36,0.6);
}

/* ── WF Compare second word ── */
.wf-compare-add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: transparent;
  border: 1.5px dashed rgba(20,184,166,0.4);
  border-radius: var(--radius);
  padding: 11px 16px;
  color: rgba(20,184,166,0.7);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all 0.2s;
  margin-top: 2px;
}
.wf-compare-add-btn:hover { border-color: #14B8A6; color: #14B8A6; background: rgba(20,184,166,0.05); }
.wf-compare-add-btn svg { width: 15px; height: 15px; }

.wf-compare-card {
  background: linear-gradient(135deg, rgba(20,184,166,0.06) 0%, var(--surface) 100%);
  border: 1px solid rgba(20,184,166,0.3);
  border-radius: var(--radius);
  padding: 16px 18px 18px;
  margin-top: 8px;
  position: relative;
  animation: slideInCompare 0.25s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes slideInCompare {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.wf-compare-label {
  font-size: 9px;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #14B8A6;
  margin-bottom: 10px;
}
.wf-compare-dismiss {
  position: absolute;
  top: 10px; right: 10px;
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  font-size: 14px;
  line-height: 1;
  transition: color 0.15s;
}
.wf-compare-dismiss:hover { color: var(--text); }

/* ── Move-to-folder overlay ── */
.rep-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,6,15,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}
.rep-overlay-panel {
  background: var(--bg2);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg);
  padding: 20px;
  width: 100%;
  max-width: 440px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.rep-overlay-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: #14B8A6;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.rep-overlay-subtitle {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 4px;
}
.rep-overlay-folder-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
  width: 100%;
  text-align: left;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.rep-overlay-folder-btn:hover { border-color: #14B8A6; color: #14B8A6; }
.rep-overlay-folder-btn span { font-size: 18px; }
.rep-overlay-cancel {
  background: none;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text3);
  font-family: var(--font-body);
  text-align: center;
  width: 100%;
  transition: color 0.15s;
}
.rep-overlay-cancel:hover { color: var(--text); }
.rep-overlay-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.rep-overlay-input:focus { border-color: #14B8A6; }
.rep-overlay-confirm {
  background: #14B8A6;
  border: none;
  border-radius: var(--radius-sm);
  padding: 11px 20px;
  color: #05060F;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  transition: opacity 0.2s;
}
.rep-overlay-confirm:hover { opacity: 0.85; }

/* ── BILAN ───────────────────────────────────────────────────── */
.bilan-num-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0 2px;
  min-height: 40px;
}


.bilan-intro { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.bilan-icon { font-size: 36px; }
.bilan-intro p { font-size: 13px; color: var(--text2); line-height: 1.6; max-width: 320px; }
.generate-passage-btn { display: flex; align-items: center; gap: 8px; background: color-mix(in srgb, #C084FC 15%, var(--surface)); border: 1px solid color-mix(in srgb, #C084FC 40%, transparent); border-radius: 100px; padding: 11px 24px; color: #C084FC; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.generate-passage-btn:hover { background: color-mix(in srgb, #C084FC 25%, var(--surface)); transform: scale(1.02); }
.generate-passage-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.generate-passage-btn svg { width: 16px; height: 16px; }
.bilan-passage-card { background: var(--surface); border: 1px solid color-mix(in srgb, #C084FC 25%, var(--border)); border-radius: var(--radius-lg); padding: 20px; }
.bilan-action-btn {
  background: var(--surface2);
  border: 1px solid color-mix(in srgb, #2DD4BF 30%, var(--border));
  border-radius: 10px;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #2DD4BF;
  transition: all 0.2s;
  flex-shrink: 0;
}
.bilan-action-btn:hover:not(:disabled) { border-color: #2DD4BF; background: color-mix(in srgb, #2DD4BF 15%, var(--surface2)); }
.bilan-action-btn:disabled { opacity: 0.3; cursor: default; }
.bilan-action-btn svg { width: 17px; height: 17px; }
.bilan-tip {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.5;
  padding: 0 4px;
}

.bilan-empty { text-align: center; padding: 32px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
/* ── PASSAGE NUMBER STRIP CAROUSEL ──────────────────────────── */
.read-num-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 4px 0 2px;
  min-height: 40px;
}
.pnum-btn {
  border-radius: 50%;
  border: 2px solid;
  font-family: var(--font-display);
  font-weight: 800;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.pnum-btn:active { transform: scale(0.88); }
.pnum-active { box-shadow: 0 0 12px 2px color-mix(in srgb, currentColor 40%, transparent); }
.pnum-add {
  width: 26px !important;
  height: 26px !important;
  font-size: 18px !important;
  font-weight: 400 !important;
  border-color: #F59E0B !important;
  color: #F59E0B !important;
  background: transparent !important;
}

/* ── RECORD RING (side by side with score ring) ─────────────── */
.score-display {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.record-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.score-ring-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
}
/* When record ring is present, lay rings side by side */
.score-display:has(.record-ring-wrap) {
  flex-direction: row;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}
.score-display:has(.record-ring-wrap) .score-feedback {
  width: 100%;
  text-align: center;
  order: 10;
}
.score-display:has(.record-ring-wrap) .score-sub-row {
  width: 100%;
  order: 11;
}
.score-display:has(.record-ring-wrap) .score-ring {
  width: 90px;
  height: 90px;
}
.score-display:has(.record-ring-wrap) .score-ring .score-number {
  font-size: 22px !important;
}
.score-display:has(.record-ring-wrap) .record-ring-wrap .score-ring {
  width: 80px;
  height: 80px;
}

/* ── READ PASSAGE WRAP (card + chevrons inline) ──────────────── */
.read-passage-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  position: relative;
}
.read-chev {
  background: transparent;
  border: none;
  padding: 8px 4px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
}
.read-chev:active { transform: scale(0.85); }
.read-chev svg { width: 24px; height: 24px; filter: drop-shadow(0 0 4px currentColor); }
.read-chev.invisible { visibility: hidden; pointer-events: none; }
.read-chev-l { padding-right: 6px; }
.read-chev-r { padding-left: 6px; }
.read-passage-wrap .passage-card { flex: 1; min-width: 0; }

/* ── NUMBERED PASSAGE/WORD BUTTONS ──────────────────────────── */
.passage-num-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.passage-num-btn:active { transform: scale(0.9); }
.passage-add-btn {
  font-size: 18px !important;
  font-weight: 400 !important;
}
.carousel-num-btn {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.carousel-num-btn:active { transform: scale(0.88); }

/* ── READ CAROUSEL LAYOUT ────────────────────────────────────── */
/* .read-carousel/.read-center/.read-passage-nums replaced by read-num-strip */
.passage-best-score {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
}

/* Bonus passage card */
.bonus-passage {
  border-color: rgba(245,158,11,0.35) !important;
  background: linear-gradient(135deg, rgba(245,158,11,0.06) 0%, var(--surface) 100%) !important;
}
.bonus-badge {
  font-size: 11px;
  font-weight: 700;
  color: #F59E0B;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

/* invisible arrow placeholder keeps layout stable */
.invisible { visibility: hidden; pointer-events: none; }

/* ── WORD ANNOTATION OVERLAY ─────────────────────────────────── */
.annotate-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px auto 0;
  background: color-mix(in srgb, #C084FC 12%, var(--surface));
  border: 1px solid color-mix(in srgb, #C084FC 35%, transparent);
  border-radius: 100px;
  padding: 9px 20px;
  color: #C084FC;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.annotate-btn:hover { background: color-mix(in srgb, #C084FC 22%, var(--surface)); }
.annotate-btn svg { width: 16px; height: 16px; }

.annotation-overlay {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ann-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.ann-legend-item { display: flex; align-items: center; gap: 4px; }
.ann-text {
  font-size: 15px;
  line-height: 2.2;
  color: var(--text);
}
.ann-word {
  position: relative;
  display: inline;
  border-radius: 4px;
  padding: 1px 3px;
  cursor: default;
  transition: all 0.15s;
}
.ann-score {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg);
  border: 1px solid var(--border-bright);
  border-radius: 6px;
  padding: 3px 7px;
  font-size: 10px;
  font-weight: 700;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}
.ann-word:hover .ann-score,
.ann-word:active .ann-score { display: block; }
.ann-good    { background: rgba(52,211,153,0.18); color: #34D399; border-bottom: 2px solid #34D399; }
.ann-ok      { background: rgba(251,191,36,0.15); color: #FBBF24; border-bottom: 2px solid #FBBF24; }
.ann-bad     { background: rgba(248,113,113,0.18); color: #F87171; border-bottom: 2px solid #F87171; }
.ann-omission{ background: rgba(156,163,175,0.15); color: #9CA3AF; border-bottom: 2px dashed #9CA3AF; text-decoration: line-through; }
.ann-neutral { color: var(--text); }
.ann-tappable { cursor: pointer; transition: filter 0.15s; }
.ann-tappable:hover { filter: brightness(1.35); }
.ann-tappable:active { filter: brightness(0.8) scale(0.96); transform: scale(0.96); }

/* ── WORD FOCUS ─────────────────────────────────────────────── */
.wf-container { padding: 0 20px 32px; display: flex; flex-direction: column; gap: 16px; }

.wf-input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.wf-input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.wf-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 18px;
  outline: none;
  transition: border-color 0.2s;
}
.wf-input:focus { border-color: #14B8A6; }
.wf-input::placeholder { color: var(--text3); font-size: 15px; }
.wf-go-btn {
  background: linear-gradient(135deg, #14B8A6, #0D9488);
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  color: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.wf-go-btn:hover { opacity: 0.88; }
.wf-go-btn:active { transform: scale(0.96); }

.wf-word-card {
  background: var(--surface);
  border: 1px solid rgba(20, 184, 166, 0.25);
  border-radius: var(--radius);
  padding: 24px 20px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
}
.wf-word-display {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  text-align: center;
}
.wf-ipa {
  font-size: 18px;
  color: #14B8A6;
  letter-spacing: 0.04em;
  min-height: 26px;
  text-align: center;
}
.wf-ipa-loading { color: var(--text3); font-size: 13px; font-style: italic; }

.wf-listen-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  justify-content: center;
  width: 100%;
}
.wf-listen-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  background: var(--surface2);
  border: 1px solid rgba(20,184,166,0.3);
  border-radius: 12px;
  padding: 11px 14px;
  color: #14B8A6;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.wf-listen-btn:hover { background: rgba(20,184,166,0.12); border-color: #14B8A6; }
.wf-listen-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.wf-listen-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.wf-record-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.wf-record-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
}
.wf-record-inner {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 0 0 rgba(20,184,166,0.4);
}
.wf-record-inner svg { width: 28px; height: 28px; color: #fff; }
.wf-record-btn:hover .wf-record-inner { transform: scale(1.05); }
.wf-record-btn.recording .wf-record-inner {
  background: linear-gradient(135deg, #F87171, #EF4444);
  animation: wf-pulse 1.2s ease-in-out infinite;
}
@keyframes wf-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.5); }
  50% { box-shadow: 0 0 0 12px rgba(248,113,113,0); }
}
.wf-record-label { font-size: 12px; color: var(--text2); font-family: var(--font-body); }

.wf-history {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.wf-history-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin-bottom: 12px;
}
.wf-history-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.wf-history-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.wf-history-chip:hover { border-color: #14B8A6; color: #14B8A6; }
.wf-history-chip .wf-chip-score {
  font-size: 11px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 6px;
  background: var(--surface2);
}
.wf-empty-hint {
  font-size: 13px;
  color: var(--text3);
  font-style: italic;
  text-align: center;
  padding: 8px 0;
}

/* long-press ring on ann-words */
.ann-word.lp-active {
  outline: 2px solid #14B8A6;
  outline-offset: 2px;
  border-radius: 4px;
}

.labo-scores-empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text2);
  font-size: 14px;
  line-height: 1.6;
}

.bilan-saved-msg { font-size: 12px; color: var(--text2); text-align: center; padding: 6px 12px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }

/* ── BILAN SCORES SECTION ────────────────────────────────────── */
.bilan-summary-section { background: color-mix(in srgb, #3D0066 15%, var(--surface)); border: 1px solid color-mix(in srgb, #C084FC 30%, var(--border)); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
.bilan-summary-header { display: flex; align-items: center; justify-content: space-between; }
.bilan-summary-title { font-size: 14px; font-weight: 700; color: #C084FC; }
.bilan-redo-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid color-mix(in srgb, #C084FC 40%, transparent); border-radius: 100px; padding: 6px 14px; color: #C084FC; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.bilan-redo-btn:hover { background: color-mix(in srgb, #C084FC 15%, transparent); }
.bilan-redo-btn svg { width: 13px; height: 13px; }
.bilan-summary-note { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.bilan-cat-list { display: flex; flex-direction: column; gap: 8px; }
.bilan-cat-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.bilan-cat-name { font-size: 13px; font-weight: 600; }
.bilan-cat-scores { display: flex; align-items: center; gap: 6px; }
.bilan-score-latest { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
.bilan-score-sep { color: var(--text3); font-size: 12px; }
.bilan-score-best { font-family: var(--font-display); font-size: 12px; font-weight: 700; opacity: 0.85; }
.bilan-cat-pill { font-family: var(--font-display); font-size: 11px; font-weight: 700; margin-left: 8px; background: var(--surface); border-radius: 6px; padding: 2px 6px; border: 1px solid var(--border); }

/* ── LABO THEME ──────────────────────────────────────────────── */

/* Beaker button on home — glows teal */
.labo-btn {
  color: #00F5D4 !important;
  position: relative;
}
.labo-btn svg {
  filter: drop-shadow(0 0 6px rgba(0,245,212,0.5));
}

/* Labo header background wash */
.labo-header {
  position: relative;
}
.labo-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,245,212,0.07) 0%, transparent 70%);
  pointer-events: none;
  border-radius: inherit;
}

/* Labo logo */
.labo-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.labo-logo-icon {
  width: 28px;
  height: 28px;
  color: #00F5D4;
  filter: drop-shadow(0 0 8px rgba(0,245,212,0.6));
  flex-shrink: 0;
}
.labo-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(135deg, #00F5D4 0%, #2DD4BF 50%, #67E8F9 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.labo-tagline {
  font-size: 12px;
  color: #2DD4BF !important;
  opacity: 0.8;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}

/* Home button inside labo header */
.labo-home-btn {
  color: #C084FC !important;
}
.labo-home-btn svg {
  filter: drop-shadow(0 0 6px rgba(192,132,252,0.55));
}
.labo-scores-btn {
  color: #00F5D4 !important;
}
.labo-scores-btn svg {
  filter: drop-shadow(0 0 5px rgba(0,245,212,0.4));
}

/* Labo grid — same layout as home */
.labo-grid {
  /* inherits .category-grid styles */
}

/* Labo tiles — teal family glow overrides */
.labo-tile {
  position: relative;
  overflow: hidden;
}
.labo-tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 30%, color-mix(in srgb, var(--cat-accent) 12%, transparent), transparent 70%);
  pointer-events: none;
}
.labo-tile:hover {
  box-shadow: 0 0 0 1px var(--cat-accent), 0 4px 24px color-mix(in srgb, var(--cat-accent) 20%, transparent);
}
.labo-tile .cat-icon {
  font-size: 28px;
}
.labo-tile .cat-label {
  color: var(--cat-accent);
}

/* Coming soon tiles */
.labo-coming-soon {
  opacity: 0.55;
  cursor: default;
}
.labo-coming-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: color-mix(in srgb, var(--cat-accent) 20%, transparent);
  border: 1px solid color-mix(in srgb, var(--cat-accent) 40%, transparent);
  border-radius: 100px;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--cat-accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Labo screen headers (for Phrase libre / Bilan sub-screens) */
.labo-screen-accent { color: #00F5D4; }

/* ── TILE LOCKED ─────────────────────────────────────────────── */
.tile-locked { opacity: 0.5; filter: grayscale(0.6); cursor: not-allowed; }

/* ── TOAST ───────────────────────────────────────────────────── */
.toast-msg { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 100px; padding: 12px 24px; font-size: 13px; color: var(--text); text-align: center; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 999; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); pointer-events: none; }
.toast-msg.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── UTILITIES ───────────────────────────────────────────────── */
button { font-family: var(--font-body); -webkit-tap-highlight-color: transparent; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ═══════════════════════════════════════════════════════════════
   LE GRENIER — Spaced Repetition Feature (Neon Orange Palette)
   ═══════════════════════════════════════════════════════════════ */

:root {
  --gr-orange: #FF6B1A;
  --gr-orange2: #FF8C42;
  --gr-orange-dim: rgba(255,107,26,0.18);
  --gr-orange-glow: rgba(255,107,26,0.35);
  --gr-amber: #FFB347;
  --gr-bg: #100800;
  --gr-bg2: #1A0E00;
  --gr-bg3: #221500;
  --gr-surface: #2A1A00;
  --gr-surface2: #331F00;
  --gr-border: rgba(255,107,26,0.20);
  --gr-border-bright: rgba(255,107,26,0.45);
}

/* ── Grenier Home ────────────────────────────────────────────── */
.grenier-screen {
  background: var(--gr-bg);
  min-height: 100%;
  position: relative;
}
.grenier-screen::before {
  content: '';
  position: fixed;
  top: -40%;
  left: -40%;
  width: 180%;
  height: 180%;
  background:
    radial-gradient(ellipse 500px 300px at 70% 10%, rgba(255,107,26,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 400px 300px at 20% 80%, rgba(255,140,66,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.grenier-header {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  background: linear-gradient(180deg, rgba(255,107,26,0.06) 0%, transparent 100%);
  border-bottom: 1px solid var(--gr-border);
}
.grenier-logo {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.grenier-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--gr-orange);
  letter-spacing: -0.02em;
  text-shadow: 0 0 20px var(--gr-orange-glow);
}
.grenier-tagline {
  font-size: 11px;
  color: rgba(255,107,26,0.6);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.grenier-header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.grenier-icon-btn {
  background: var(--gr-surface);
  border: 1px solid var(--gr-border);
  border-radius: var(--radius-sm);
  color: var(--gr-orange2);
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.grenier-icon-btn:hover { background: var(--gr-surface2); border-color: var(--gr-border-bright); }
.grenier-icon-btn svg { width: 18px; height: 18px; }

/* Toolbar: view toggle + add button */
.grenier-toolbar {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
}
.grenier-view-toggle {
  display: flex;
  background: var(--gr-surface);
  border: 1px solid var(--gr-border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.grenier-view-btn {
  background: none;
  border: none;
  padding: 6px 12px;
  color: var(--gr-orange2);
  opacity: 0.5;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
}
.grenier-view-btn.active {
  background: var(--gr-orange-dim);
  opacity: 1;
  color: var(--gr-orange);
}
.grenier-view-btn svg { width: 15px; height: 15px; }

/* Deck Grid / List */
.grenier-decks-area {
  position: relative;
  z-index: 1;
  padding: 8px 16px 100px;
}
.grenier-decks-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.grenier-decks-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.grenier-empty {
  text-align: center;
  padding: 60px 20px;
  color: rgba(255,107,26,0.4);
}
.grenier-empty-icon { font-size: 48px; margin-bottom: 12px; }
.grenier-empty-text { font-size: 14px; line-height: 1.5; }

/* Deck Card */
.grenier-deck-card {
  background: var(--gr-surface);
  border: 1px solid var(--gr-border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
  text-align: left;
  width: 100%;
}
.grenier-deck-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--deck-accent, var(--gr-orange));
  border-radius: var(--radius) var(--radius) 0 0;
}
.grenier-deck-card:hover {
  transform: translateY(-2px);
  border-color: var(--gr-border-bright);
  box-shadow: 0 8px 24px rgba(255,107,26,0.12);
}
.grenier-deck-card.deck-selected {
  border-color: var(--deck-accent, var(--gr-orange));
  box-shadow: 0 0 0 2px var(--deck-accent, var(--gr-orange));
}
.grenier-deck-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 4px;
  word-break: break-word;
}
.grenier-deck-meta {
  font-size: 11px;
  color: rgba(255,107,26,0.6);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.grenier-deck-due {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: rgba(255,107,26,0.15);
  border-radius: 100px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gr-orange);
}
.grenier-deck-due.zero { background: rgba(255,255,255,0.05); color: var(--text3); }

/* List view deck row */
.grenier-decks-list .grenier-deck-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
}
.grenier-decks-list .grenier-deck-card::before { display: none; }
.grenier-deck-accent-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--deck-accent, var(--gr-orange));
  flex-shrink: 0;
}
.grenier-decks-list .grenier-deck-name { margin-bottom: 0; flex: 1; }

/* FAB button */
.grenier-fab {
  position: fixed;
  bottom: 28px;
  right: 20px;
  z-index: 100;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--gr-orange);
  border: none;
  color: #fff;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px var(--gr-orange-glow), 0 0 40px rgba(255,107,26,0.25);
  transition: transform 0.15s, box-shadow 0.15s;
}
.grenier-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--gr-orange-glow); }
.grenier-fab.open { transform: rotate(45deg); }

/* FAB menu */
.grenier-fab-menu {
  position: fixed;
  bottom: 96px;
  right: 20px;
  z-index: 99;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: flex-end;
  pointer-events: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.2s, transform 0.2s;
}
.grenier-fab-menu.open { opacity: 1; transform: translateY(0); pointer-events: all; }
.grenier-fab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  background: none;
  border: none;
}
.grenier-fab-label {
  background: var(--gr-surface2);
  border: 1px solid var(--gr-border-bright);
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--gr-orange2);
}
.grenier-fab-icon {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--gr-surface2);
  border: 1.5px solid var(--gr-border-bright);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* ── Deck Context Menu (long press) ─────────────────────────── */
.grenier-ctx-menu {
  position: fixed;
  z-index: 200;
  background: var(--gr-surface2);
  border: 1px solid var(--gr-border-bright);
  border-radius: var(--radius);
  overflow: hidden;
  min-width: 180px;

  padding: 12px 16px;
  font-size: 14px;

  background: none;

  width: 100%;
